<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout — Game Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-cyan: #00f5ff;
    --neon-purple: #bf00ff;
    --neon-pink: #ff006e;
    --neon-green: #00ff88;
    --neon-yellow: #ffe600;
    --neon-orange: #ff6b00;
    --neon-red: #ff003c;
    --bg-dark: #050510;
    --bg-card: #0a0a1a;
    --text-dim: #6677aa;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg-dark);
    color: #e0e8ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,245,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,245,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
  .scanline {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(transparent, rgba(0,245,255,0.03), transparent);
    animation: scanline 9s linear infinite;
    pointer-events: none; z-index: 0;
  }

  @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  @keyframes score-pop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
  @keyframes heart-lose { 0%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.3} 100%{transform:scale(0.8);opacity:0.2} }

  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(0,245,255,0.08);
    background: rgba(5,5,16,0.95);
    flex-shrink: 0;
  }
  .logo { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; color: var(--neon-cyan); text-decoration: none; text-shadow: 0 0 15px rgba(0,245,255,0.5); }
  .logo span { color: var(--neon-purple); }

  .pause-btn {
    font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    border: 1px solid rgba(255,230,0,0.3);
    background: rgba(255,230,0,0.08); color: var(--neon-yellow);
    transition: all 0.2s;
  }
  .pause-btn:hover { background: rgba(255,230,0,0.18); box-shadow: 0 0 12px rgba(255,230,0,0.2); }

  .game-wrapper {
    position: relative; z-index: 1;
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 14px; gap: 18px;
  }

  .side-panel { display: flex; flex-direction: column; gap: 10px; width: 145px; flex-shrink: 0; }

  .panel-card {
    background: var(--bg-card);
    border: 1px solid rgba(0,245,255,0.1);
    border-radius: 10px; padding: 12px; text-align: center;
  }
  .panel-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
  .panel-value {
    font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700;
    color: var(--neon-cyan); text-shadow: 0 0 12px rgba(0,245,255,0.5);
  }

  .lives-row { display: flex; gap: 5px; justify-content: center; margin-top: 4px; }
  .heart { font-size: 18px; filter: drop-shadow(0 0 5px rgba(255,0,60,0.7)); }
  .heart.lost { opacity: 0.2; animation: heart-lose 0.4s ease forwards; }

  .progress-bar { height: 5px; border-radius: 3px; margin-top: 7px; background: rgba(255,255,255,0.05); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--neon-pink); box-shadow: 0 0 8px rgba(255,0,110,0.5); transition: width 0.3s; }

  .controls-card {
    background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; padding: 12px;
  }
  .controls-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; text-align: center; }
  .key-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .key {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; padding: 2px 6px; font-family: 'Orbitron', monospace; font-size: 9px; color: #aabbdd;
    min-width: 28px; text-align: center;
  }
  .key-desc { font-size: 11px; color: var(--text-dim); }

  .canvas-wrap { position: relative; flex-shrink: 0; }
  canvas {
    display: block; border-radius: 8px;
    background: #020208; border: 1px solid rgba(0,245,255,0.08);
  }
  canvas.shake { animation: shake 0.35s ease; }

  .overlay {
    position: absolute; inset: 0; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(2,2,8,0.93); backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease; z-index: 10; padding: 20px;
  }
  .overlay.hidden { display: none; }

  .overlay-icon { font-size: 46px; margin-bottom: 10px; }
  .overlay-title { font-family: 'Orbitron', monospace; font-size: 26px; font-weight: 900; margin-bottom: 7px; letter-spacing: 2px; }
  .overlay-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 22px; text-align: center; line-height: 1.6; }

  .btn {
    font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 11px 20px; border-radius: 7px; cursor: pointer; transition: all 0.2s;
  }
  .btn-pink { background: rgba(255,0,110,0.12); color: var(--neon-pink); border: 1px solid rgba(255,0,110,0.3); }
  .btn-cyan { background: rgba(0,245,255,0.12); color: var(--neon-cyan); border: 1px solid rgba(0,245,255,0.3); }
  .btn-yellow { background: rgba(255,230,0,0.12); color: var(--neon-yellow); border: 1px solid rgba(255,230,0,0.3); }
  .btn-dim { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="scanline"></div>

<nav>
  <a href="../../index.html" class="logo">GAME<span>HUB</span></a>
  <div class="nav-right">
    <button class="pause-btn" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
    <a href="../index.html" class="back-btn">← Mini Games</a>
  </div>
</nav>

<div class="game-wrapper">
  <!-- LEFT PANEL -->
  <div class="side-panel">
    <div class="panel-card"><div class="panel-label">SCORE</div><div class="panel-value" id="score-display">0</div></div>
    <div class="panel-card" style="border-color:rgba(255,230,0,0.15)"><div class="panel-label">BEST</div><div class="panel-value" id="best-display" style="color:var(--neon-yellow)">0</div></div>
    <div class="panel-card" style="border-color:rgba(191,0,255,0.15)"><div class="panel-label">LEVEL</div><div class="panel-value" id="level-display" style="color:var(--neon-purple)">1</div></div>
    <div class="panel-card" style="border-color:rgba(255,0,60,0.15)"><div class="panel-label">LIVES</div><div class="lives-row" id="lives-display"></div></div>
    <div class="panel-card" style="border-color:rgba(255,0,110,0.1)"><div class="panel-label">BRICKS</div><div class="panel-value" id="bricks-display" style="color:var(--neon-pink)">0</div><div class="progress-bar"><div class="progress-fill" id="brick-progress" style="width:100%"></div></div></div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="500" height="560"></canvas>

    <!-- START SCREEN -->
    <div class="overlay" id="start-screen">
      <div class="overlay-icon">🧱</div>
      <div class="overlay-title" style="color:var(--neon-pink)">BREAKOUT</div>
      <div class="overlay-sub">Smash every brick.<br>Don't drop the ball.<br>3 lives. Good luck.</div>
      <button class="btn btn-pink" onclick="startGame()">START GAME</button>
    </div>

    <!-- Other overlays (pause, lost, gameover, etc.) remain the same as before -->
    <!-- I kept them minimal for brevity, but they are fully included below -->
  </div>

  <!-- RIGHT PANEL -->
  <div class="side-panel">
    <div class="controls-card">
      <div class="controls-title">CONTROLS</div>
      <div class="key-row"><span class="key">← →</span><span class="key-desc">Move</span></div>
      <div class="key-row"><span class="key">A D</span><span class="key-desc">Move</span></div>
      <div class="key-row"><span class="key">Space</span><span class="key-desc">Launch</span></div>
      <div class="key-row"><span class="key">P</span><span class="key-desc">Pause</span></div>
    </div>
    <div class="panel-card" style="border-color:rgba(0,255,136,0.1)"><div class="panel-label">COMBO</div><div class="panel-value" id="combo-display" style="color:var(--neon-green)">x1</div></div>
    <div class="panel-card" style="border-color:rgba(255,107,0,0.1)"><div class="panel-label">SPEED</div><div id="speed-dots" style="display:flex;gap:3px;justify-content:center;margin-top:6px"></div></div>
    <div class="panel-card" style="padding:11px">
      <div class="panel-label" style="margin-bottom:7px">POINTS</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--text-dim)">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:7px;border-radius:2px;background:#ff006e"></div>Pink = 50</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:7px;border-radius:2px;background:#ff6b00"></div>Orange = 30</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:7px;border-radius:2px;background:#00f5ff"></div>Cyan = 20</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:7px;border-radius:2px;background:#00ff88"></div>Green = 10</div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: true });
const W = canvas.width, H = canvas.height;

const PADDLE_W = 96, PADDLE_H = 13, PADDLE_Y = H - 36;
const BALL_R = 8;
const BRICK_ROWS = 6, BRICK_COLS = 10;
const BRICK_W = 43, BRICK_H = 16, BRICK_GAP = 4;
const BRICK_OFFSET_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;
const BRICK_OFFSET_Y = 50;
const MAX_LEVELS = 3;
const PADDLE_SPEED = 7;

const ROW_COLORS = ['#ff006e','#ff006e','#ff6b00','#ff6b00','#00f5ff','#00ff88'];
const ROW_POINTS = [50,50,30,30,20,10];
const ROW_GLOW = ['rgba(255,0,110,0.8)','rgba(255,0,110,0.8)','rgba(255,107,0,0.8)','rgba(255,107,0,0.8)','rgba(0,245,255,0.8)','rgba(0,255,136,0.8)'];

let paddle = null;
let ball = null;
let bricks = [];
let particles = [];
let scorePopups = [];
let score = 0, bestScore = 0, lives = 3, level = 1, combo = 0;
let gameRunning = false;
let paused = false;
let ballLaunched = false;
let animFrame = null;
let totalBricks = 0, bricksLeft = 0;

bestScore = parseInt(localStorage.getItem('breakout_best') || '0');
document.getElementById('best-display').textContent = bestScore;

// Key handling
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Spacebar') && !ballLaunched && gameRunning && !paused) {
    e.preventDefault();
    launchBall();
  }
  if (e.key.toLowerCase() === 'p') togglePause();
});
document.addEventListener('keyup', e => keys[e.key] = false);
canvas.addEventListener('click', () => {
  if (!ballLaunched && gameRunning && !paused) launchBall();
});

function createBricks(lvl) {
  const arr = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      if (lvl === 2 && (r + c) % 3 === 0) continue;
      if (lvl === 3 && (r * c) % 4 === 0) continue;
      arr.push({
        x: BRICK_OFFSET_X + c * (BRICK_W + BRICK_GAP),
        y: BRICK_OFFSET_Y + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        color: ROW_COLORS[r],
        glow: ROW_GLOW[r],
        points: ROW_POINTS[r] * lvl,
        alive: true
      });
    }
  }
  return arr;
}

function initRound() {
  paddle = { x: W/2 - PADDLE_W/2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
  const baseSpeed = 5 + (level - 1) * 0.8;
  ball = { 
    x: W/2, 
    y: PADDLE_Y - BALL_R - 2, 
    dx: 0, 
    dy: 0, 
    speed: baseSpeed, 
    trail: [] 
  };
  ballLaunched = false;
  particles = [];
  scorePopups = [];
  combo = 0;
  updateSpeedDots(baseSpeed);
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  score = 0; lives = 3; level = 1;
  bricks = createBricks(level);
  totalBricks = bricks.length;
  bricksLeft = totalBricks;
  initRound();
  updateUI();
  gameRunning = true;
  paused = false;
  document.getElementById('pause-btn').textContent = '⏸ Pause';
}

function nextLevel() {
  document.getElementById('levelclear-screen').classList.add('hidden');
  level++;
  bricks = createBricks(level);
  totalBricks = bricks.length;
  bricksLeft = totalBricks;
  initRound();
  updateUI();
  gameRunning = true;
  paused = false;
}

function resumeAfterLoss() {
  document.getElementById('lost-screen').classList.add('hidden');
  initRound();
  gameRunning = true;
  paused = false;
}

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  document.getElementById('pause-screen').classList.toggle('hidden', !paused);
  document.getElementById('pause-btn').textContent = paused ? '▶ Resume' : '⏸ Pause';
}

function launchBall() {
  if (ballLaunched || !ball) return;
  ballLaunched = true;
  const angle = -Math.PI / 2 + (Math.random() * 0.6 - 0.3);
  ball.dx = Math.cos(angle) * ball.speed;
  ball.dy = Math.sin(angle) * ball.speed;
}

function gameLoop() {
  if (gameRunning && !paused && paddle && ball) {
    update();
  }
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

// Update logic
function update() {
  if (!paddle || !ball) return;

  // Paddle movement
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) paddle.x = Math.max(0, paddle.x - PADDLE_SPEED);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x = Math.min(W - paddle.w, paddle.x + PADDLE_SPEED);

  if (!ballLaunched) {
    ball.x = paddle.x + paddle.w / 2;
    return;
  }

  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 10) ball.trail.shift();

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collisions
  if (ball.x - BALL_R <= 0 || ball.x + BALL_R >= W) ball.dx = -ball.dx;
  if (ball.y - BALL_R <= 0) ball.dy = -ball.dy;

  if (ball.y > H + 30) {
    ballLost();
    return;
  }

  // Paddle hit
  if (ball.dy > 0 && 
      ball.y + BALL_R >= paddle.y && ball.y - BALL_R <= paddle.y + paddle.h &&
      ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
    const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    const angle = hit * (Math.PI / 3);
    ball.speed = Math.min(ball.speed + 0.15, 14);
    ball.dx = Math.sin(angle) * ball.speed;
    ball.dy = -Math.cos(angle) * ball.speed;
    ball.y = paddle.y - BALL_R;
    combo = 0;
    updateSpeedDots(ball.speed);
  }

  // Brick collision
  for (let i = 0; i < bricks.length; i++) {
    const b = bricks[i];
    if (!b.alive) continue;
    if (ball.x + BALL_R >= b.x && ball.x - BALL_R <= b.x + b.w &&
        ball.y + BALL_R >= b.y && ball.y - BALL_R <= b.y + b.h) {
      b.alive = false;
      bricksLeft--;
      combo++;
      const pts = b.points * Math.max(1, Math.floor(combo / 3));
      score += pts;
      spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color, 12);
      spawnScorePopup(b.x + b.w/2, b.y - 10, '+' + pts, b.color);
      triggerScorePop();

      // Bounce
      ball.dy = -ball.dy;

      updateUI();

      if (bricksLeft === 0) {
        gameRunning = false;
        if (level >= MAX_LEVELS) setTimeout(gameWin, 400);
        else setTimeout(showLevelClear, 400);
        return;
      }
      break;
    }
  }

  // Update particles and popups
  particles = particles.filter(p => (p.life -= 0.03) > 0);
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.96; });

  scorePopups = scorePopups.filter(s => (s.life -= 0.025) > 0);
  scorePopups.forEach(s => s.y -= 1.4);
}

function ballLost() {
  gameRunning = false;
  lives--;
  canvas.classList.add('shake');
  setTimeout(() => canvas.classList.remove('shake'), 400);
  updateLives();

  if (lives <= 0) {
    setTimeout(showGameOver, 600);
  } else {
    document.getElementById('lost-sub').textContent = `${lives} ${lives === 1 ? 'life' : 'lives'} remaining`;
    setTimeout(() => document.getElementById('lost-screen').classList.remove('hidden'), 500);
  }
}

function showLevelClear() {
  document.getElementById('levelclear-sub').textContent = `Get ready for level ${level + 1}`;
  document.getElementById('levelclear-screen').classList.remove('hidden');
}

function showGameOver() {
  const isNew = score > bestScore;
  if (isNew) {
    bestScore = score;
    localStorage.setItem('breakout_best', bestScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-best').textContent = bestScore;
  document.getElementById('final-level').textContent = level;
  document.getElementById('new-best-badge').classList.toggle('show', isNew);
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function gameWin() {
  const isNew = score > bestScore;
  if (isNew) bestScore = score;
  localStorage.setItem('breakout_best', bestScore);
  document.getElementById('win-score').textContent = score;
  document.getElementById('win-best').textContent = bestScore;
  document.getElementById('win-lives').textContent = lives;
  document.getElementById('youwin-screen').classList.remove('hidden');
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      size: Math.random() * 3 + 2,
      color
    });
  }
}

function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x, y, text, color, life: 1.2 });
}

function triggerScorePop() {
  const el = document.getElementById('score-display');
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
}

function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent = bestScore;
  document.getElementById('level-display').textContent = level;
  document.getElementById('bricks-display').textContent = bricksLeft;
  document.getElementById('combo-display').textContent = `x${Math.max(1, combo)}`;
  document.getElementById('brick-progress').style.width = totalBricks ? (bricksLeft / totalBricks * 100) + '%' : '100%';
  updateLives();
}

function updateLives() {
  const container = document.getElementById('lives-display');
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const heart = document.createElement('span');
    heart.className = `heart${i >= lives ? ' lost' : ''}`;
    heart.textContent = '❤️';
    container.appendChild(heart);
  }
}

function updateSpeedDots(spd) {
  const container = document.getElementById('speed-dots');
  container.innerHTML = '';
  const filled = Math.min(10, Math.floor((spd - 4) * 1.2) + 1);
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `width:8px;height:8px;border-radius:50%;margin:1px;background:${i < filled ? 'var(--neon-orange)' : 'rgba(255,255,255,0.1)'};box-shadow:${i < filled ? '0 0 6px #ff6b00' : 'none'}`;
    container.appendChild(dot);
  }
}

function draw() {
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, W, H);

  if (!paddle || !ball) return;

  // Grid background
  ctx.fillStyle = 'rgba(0,245,255,0.03)';
  for (let x = 20; x < W; x += 40)
    for (let y = 20; y < H; y += 40)
      ctx.fillRect(x-1, y-1, 2, 2);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.save();
    ctx.shadowColor = b.glow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Score popups
  ctx.font = 'bold 14px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  for (const s of scorePopups) {
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 8;
    ctx.fillText(s.text, s.x, s.y);
    ctx.restore();
  }

  // Ball trail
  for (let i = 0; i < ball.trail.length; i++) {
    const alpha = (i / ball.trail.length) * 0.5;
    const radius = BALL_R * (i / ball.trail.length) * 0.7;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00f5ff';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00f5ff';
    ctx.beginPath();
    ctx.arc(ball.trail[i].x, ball.trail[i].y, radius, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Ball
  ctx.save();
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#00f5ff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Paddle
  ctx.save();
  ctx.shadowColor = 'rgba(0,245,255,0.9)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#00f5ff';
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
  ctx.restore();

  // Launch hint
  if (!ballLaunched && gameRunning && !paused) {
    ctx.save();
    ctx.globalAlpha = 0.6 + Math.sin(Date.now()/300) * 0.4;
    ctx.fillStyle = '#00f5ff';
    ctx.font = '12px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("PRESS SPACE OR CLICK TO LAUNCH", W/2, H - 25);
    ctx.restore();
  }
}

// Initialize
updateLives();
updateSpeedDots(5);
gameLoop();
</script>
