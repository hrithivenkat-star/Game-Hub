<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird – GameHub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --pink: #ff006e;
    --green: #39ff14;
    --yellow: #ffe600;
    --purple: #bf00ff;
    --orange: #ff6600;
    --bg: #050a0f;
    --card: #0d1117;
    --border: rgba(0,245,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes gridMove { from{background-position:0 0} to{background-position:0 40px} }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(5,10,15,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .back-btn {
    font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--cyan);
    text-decoration: none;
    padding: 8px 18px;
    border: 1px solid var(--cyan);
    border-radius: 4px;
    background: rgba(0,245,255,0.05);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .back-btn:hover {
    background: rgba(0,245,255,0.15);
    box-shadow: 0 0 18px rgba(0,245,255,0.4);
    transform: translateX(-2px);
  }
  .logo { font-family:'Orbitron',monospace; font-weight:900; font-size:18px; }
  .logo span:first-child { color:#fff; }
  .logo span:last-child { color: var(--cyan); }
  .difficulty-badge {
    font-family:'Orbitron',monospace; font-size:10px; font-weight:700;
    letter-spacing:2px; padding:6px 14px;
    background: rgba(255,0,110,0.15);
    border: 1px solid var(--pink);
    color: var(--pink); border-radius:4px;
    box-shadow: 0 0 12px rgba(255,0,110,0.3);
  }

  /* Game layout */
  .game-layout {
    display: flex; align-items: center; justify-content: center;
    gap: 24px; padding-top: 70px;
    position: relative; z-index: 1;
  }

  /* Stats panel */
  .stats-panel {
    display: flex; flex-direction: column; gap: 12px;
    width: 150px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .stat-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
  }
  .stat-card.score::before { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .stat-card.best::before { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .stat-card.combo::before { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
  .stat-label { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; color:#666; margin-bottom:6px; }
  .stat-value { font-family:'Orbitron',monospace; font-size:26px; font-weight:900; }
  .stat-card.score .stat-value { color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
  .stat-card.best .stat-value { color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }
  .stat-card.combo .stat-value { color: var(--purple); text-shadow: 0 0 15px var(--purple); }

  /* Canvas wrapper */
  .canvas-wrapper {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,245,255,0.15), 0 0 120px rgba(255,0,110,0.1);
    border: 1px solid var(--border);
  }
  canvas { display: block; }

  /* Right panel */
  .right-panel { display: flex; flex-direction: column; gap: 16px; width: 180px; }
  .controls-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .controls-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; color:#666; margin-bottom:10px; }
  .control-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .key-badge {
    font-family:'Orbitron',monospace; font-size:9px;
    background: rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
    border-radius:3px; padding:3px 7px; color:#aaa; min-width:50px; text-align:center;
  }
  .key-desc { font-size:13px; color:#666; }

  .pipe-legend { background: var(--card); border: 1px solid var(--border); border-radius:8px; padding:16px; }
  .legend-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; color:#666; margin-bottom:10px; }
  .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; color:#888; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  /* Overlay */
  #overlay {
    position: absolute; inset:0;
    display: flex; flex-direction:column; align-items:center; justify-content:center;
    background: rgba(5,10,15,0.88);
    backdrop-filter: blur(4px);
    z-index: 10; gap: 20px;
    border-radius: 12px;
  }
  .bird-icon { font-size:48px; animation: birdFloat 2s ease-in-out infinite; }
  @keyframes birdFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .game-title {
    font-family:'Orbitron',monospace; font-weight:900; font-size:36px;
    background: linear-gradient(135deg, var(--cyan), var(--pink), var(--yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none; letter-spacing:3px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
  .game-subtitle { font-size:14px; color:#666; letter-spacing:1px; text-align:center; line-height:1.6; }
  .play-btn {
    font-family:'Orbitron',monospace; font-weight:700; font-size:13px; letter-spacing:3px;
    padding:14px 40px; border:none; border-radius:6px; cursor:pointer;
    background: linear-gradient(135deg, var(--cyan), var(--green));
    color: #000; position:relative; overflow:hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 30px rgba(0,245,255,0.4);
  }
  .play-btn:hover { transform:scale(1.05); box-shadow:0 0 50px rgba(0,245,255,0.6); }
  .play-btn:active { transform:scale(0.97); }

  #overlay.gameover .game-title { background: linear-gradient(135deg, var(--pink), var(--orange), var(--yellow)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .final-score { font-family:'Orbitron',monospace; font-size:48px; font-weight:900; color:var(--cyan); text-shadow:0 0 30px var(--cyan); }
  .new-best { font-family:'Orbitron',monospace; font-size:12px; letter-spacing:3px; color:var(--yellow); animation:blink 0.8s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Particles */
  #particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="topbar">
  <a class="back-btn" onclick="history.back()">← MINI GAMES</a>
  <div class="logo"><span>GAME</span><span>HUB</span></div>
  <div class="difficulty-badge">HARD</div>
</div>

<div class="game-layout">
  <!-- Left stats -->
  <div class="stats-panel">
    <div class="stat-card score">
      <div class="stat-label">SCORE</div>
      <div class="stat-value" id="scoreDisplay">0</div>
    </div>
    <div class="stat-card best">
      <div class="stat-label">BEST</div>
      <div class="stat-value" id="bestDisplay">0</div>
    </div>
    <div class="stat-card combo">
      <div class="stat-label">STREAK</div>
      <div class="stat-value" id="streakDisplay">0</div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="gameCanvas" width="340" height="540"></canvas>

    <div id="overlay">
      <div class="bird-icon">🐦</div>
      <div class="game-title">FLAPPY BIRD</div>
      <div class="game-subtitle">Tap to fly. Dodge the neon pipes.<br>One touch is all it takes to die.</div>
      <button class="play-btn" id="startBtn">▶ START GAME</button>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="controls-card">
      <div class="controls-title">CONTROLS</div>
      <div class="control-row"><span class="key-badge">SPACE</span><span class="key-desc">Flap</span></div>
      <div class="control-row"><span class="key-badge">TAP</span><span class="key-desc">Flap</span></div>
      <div class="control-row"><span class="key-badge">P</span><span class="key-desc">Pause</span></div>
    </div>
    <div class="pipe-legend">
      <div class="legend-title">PIPE COLORS</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00f5ff;box-shadow:0 0 6px #00f5ff"></div>Cyan</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff006e;box-shadow:0 0 6px #ff006e"></div>Hot Pink</div>
      <div class="legend-item"><div class="legend-dot" style="background:#39ff14;box-shadow:0 0 6px #39ff14"></div>Neon Green</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffe600;box-shadow:0 0 6px #ffe600"></div>Electric Yellow</div>
      <div class="legend-item"><div class="legend-dot" style="background:#bf00ff;box-shadow:0 0 6px #bf00ff"></div>Ultra Violet</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff6600;box-shadow:0 0 6px #ff6600"></div>Neon Orange</div>
    </div>
  </div>
</div>

<script>
// ===== PARTICLE BACKGROUND =====
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
const particles = Array.from({length:60}, () => ({
  x: Math.random()*pCanvas.width, y: Math.random()*pCanvas.height,
  r: Math.random()*1.5+0.3, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
  c:['#00f5ff','#ff006e','#39ff14','#ffe600','#bf00ff'][Math.floor(Math.random()*5)],
  a: Math.random()*0.4+0.1
}));
function animParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x<0)p.x=pCanvas.width; if(p.x>pCanvas.width)p.x=0;
    if(p.y<0)p.y=pCanvas.height; if(p.y>pCanvas.height)p.y=0;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=p.c; pCtx.globalAlpha=p.a; pCtx.fill();
  });
  pCtx.globalAlpha=1;
  requestAnimationFrame(animParticles);
}
animParticles();

// ===== GAME =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PIPE_COLORS = [
  {main:'#00f5ff',dark:'#007a8a',glow:'rgba(0,245,255,0.5)'},
  {main:'#ff006e',dark:'#8a003c',glow:'rgba(255,0,110,0.5)'},
  {main:'#39ff14',dark:'#1a7a00',glow:'rgba(57,255,20,0.5)'},
  {main:'#ffe600',dark:'#8a7c00',glow:'rgba(255,230,0,0.5)'},
  {main:'#bf00ff',dark:'#5e007a',glow:'rgba(191,0,255,0.5)'},
  {main:'#ff6600',dark:'#8a3500',glow:'rgba(255,102,0,0.5)'},
];

let bird, pipes, score, bestScore, streak, gameState, animFrame, frameCount, paused;
let flashEffect = 0;
let particles2 = [];

function getBest() { return parseInt(localStorage.getItem('fb_best')||'0'); }
function setBest(v) { localStorage.setItem('fb_best',v); localStorage.setItem('fb_best_update',Date.now()); }

function initGame(){
  bird = { x:80, y:H/2, vy:0, gravity:0.45, jump:-8, w:28, h:22, angle:0, trail:[] };
  pipes = [];
  score = 0; streak = 0; frameCount = 0; paused = false;
  bestScore = getBest();
  gameState = 'playing';
  particles2 = [];
  updateDisplays();
}

function updateDisplays(){
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('bestDisplay').textContent = bestScore;
  document.getElementById('streakDisplay').textContent = streak;
}

// Draw bird
function drawBird(){
  ctx.save();
  // Trail
  bird.trail.forEach((t,i) => {
    const a = (i/bird.trail.length)*0.3;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#00f5ff';
    ctx.beginPath();
    ctx.ellipse(t.x, t.y, bird.w/2*(i/bird.trail.length), bird.h/2*(i/bird.trail.length), 0, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.angle * Math.PI/180);

  // Glow
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 20;

  // Body
  const bodyGrad = ctx.createRadialGradient(-4,-4,2,0,0,bird.w/2);
  bodyGrad.addColorStop(0,'#7fffff');
  bodyGrad.addColorStop(0.5,'#00cfff');
  bodyGrad.addColorStop(1,'#005577');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.w/2, bird.h/2, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,200,255,0.6)';
  ctx.beginPath();
  ctx.ellipse(-4, 4, 9, 5, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(7,-3,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(8,-3,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(9,-4,0.8,0,Math.PI*2); ctx.fill();

  // Beak
  ctx.fillStyle = '#ff9900';
  ctx.beginPath(); ctx.moveTo(12,1); ctx.lineTo(19,3); ctx.lineTo(12,6); ctx.closePath(); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPipe(pipe){
  const col = pipe.color;
  const pw = 52;

  // Draw top pipe
  function drawPipeSegment(x, y1, y2, flipped){
    const capH = 22, capW = pw+14;
    const bodyX = x - pw/2;
    const capX = x - capW/2;

    // Glow
    ctx.shadowColor = col.glow;
    ctx.shadowBlur = 25;

    // Body gradient
    const grad = ctx.createLinearGradient(bodyX, 0, bodyX+pw, 0);
    grad.addColorStop(0, col.dark);
    grad.addColorStop(0.3, col.main);
    grad.addColorStop(0.7, col.main);
    grad.addColorStop(1, col.dark);
    ctx.fillStyle = grad;
    ctx.fillRect(bodyX, y1, pw, y2-y1);

    // Sheen
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(bodyX+4, y1, 8, y2-y1);

    // Cap
    const capGrad = ctx.createLinearGradient(capX, 0, capX+capW, 0);
    capGrad.addColorStop(0, col.dark);
    capGrad.addColorStop(0.3, col.main);
    capGrad.addColorStop(0.7, col.main);
    capGrad.addColorStop(1, col.dark);
    ctx.fillStyle = capGrad;
    if(!flipped){
      ctx.fillRect(capX, y2-capH, capW, capH);
    } else {
      ctx.fillRect(capX, y1, capW, capH);
    }

    // Neon glow rings on cap
    ctx.strokeStyle = col.main;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = col.main; ctx.shadowBlur = 10;
    if(!flipped){
      ctx.strokeRect(capX+2, y2-capH+2, capW-4, capH-4);
    } else {
      ctx.strokeRect(capX+2, y1+2, capW-4, capH-4);
    }
    ctx.shadowBlur = 0;
  }

  drawPipeSegment(pipe.x, 0, pipe.topY, false);
  drawPipeSegment(pipe.x, pipe.topY + pipe.gap, H, true);

  // Score line (faint)
  if(!pipe.scored){
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1; ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(pipe.x, pipe.topY); ctx.lineTo(pipe.x, pipe.topY+pipe.gap); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function spawnPipe(){
  const gap = Math.max(130, 180 - score*2);
  const topY = 60 + Math.random()*(H - gap - 120);
  pipes.push({
    x: W+30, topY, gap,
    color: PIPE_COLORS[Math.floor(Math.random()*PIPE_COLORS.length)],
    scored: false, speed: 2.5 + score*0.08
  });
}

function spawnBurstParticles(x, y, color){
  for(let i=0;i<16;i++){
    const angle = (Math.PI*2/16)*i;
    const speed = 2+Math.random()*4;
    particles2.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,color,r:2+Math.random()*3});
  }
}

function drawParticles2(){
  particles2 = particles2.filter(p=>p.life>0);
  particles2.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.03;
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color.main;
    ctx.shadowColor=p.color.main; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawBackground(){
  // Dark bg
  ctx.fillStyle = '#050a0f';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(0,245,255,0.03)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=30){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=30){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Ground
  const groundGrad = ctx.createLinearGradient(0,H-40,0,H);
  groundGrad.addColorStop(0,'rgba(0,245,255,0.1)');
  groundGrad.addColorStop(1,'rgba(0,245,255,0.02)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0,H-40,W,40);
  ctx.strokeStyle = 'rgba(0,245,255,0.4)';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(0,H-40); ctx.lineTo(W,H-40); ctx.stroke();
  ctx.shadowBlur = 0;

  // Flash effect
  if(flashEffect>0){
    ctx.fillStyle = `rgba(255,255,255,${flashEffect*0.3})`;
    ctx.fillRect(0,0,W,H);
    flashEffect = Math.max(0,flashEffect-0.05);
  }
}

function checkCollision(){
  const bx=bird.x, by=bird.y, bw=bird.w*0.4, bh=bird.h*0.4;
  if(by+bh > H-40 || by-bh < 0) return true;
  for(let p of pipes){
    const pw=26;
    if(bx+bw>p.x-pw && bx-bw<p.x+pw){
      if(by-bh<p.topY || by+bh>p.topY+p.gap) return true;
    }
  }
  return false;
}

function gameLoop(){
  if(paused){ animFrame=requestAnimationFrame(gameLoop); return; }

  drawBackground();
  frameCount++;

  // Spawn pipes
  if(frameCount % 90 === 0) spawnPipe();

  // Update pipes
  pipes.forEach((p,i)=>{
    p.x -= p.speed;
    if(!p.scored && p.x < bird.x){
      p.scored = true; score++; streak++;
      updateDisplays();
      spawnBurstParticles(bird.x, bird.y, p.color);
      if(score > bestScore){ bestScore=score; setBest(bestScore); updateDisplays(); }
    }
    drawPipe(p);
  });
  pipes = pipes.filter(p=>p.x>-60);

  // Update bird
  bird.vy += bird.gravity;
  bird.y += bird.vy;
  bird.angle = Math.min(70, Math.max(-25, bird.vy * 4));

  // Trail
  bird.trail.push({x:bird.x, y:bird.y});
  if(bird.trail.length > 8) bird.trail.shift();

  // Particles
  drawParticles2();

  // Draw bird
  drawBird();

  // Draw score on canvas
  ctx.font = '700 22px Orbitron, monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.textAlign = 'center';
  ctx.fillText(score, W/2, 40);

  // Collision
  if(checkCollision()){
    flashEffect = 1;
    spawnBurstParticles(bird.x, bird.y, {main:'#ff006e',glow:'rgba(255,0,110,0.5)'});
    gameOver();
    return;
  }

  animFrame = requestAnimationFrame(gameLoop);
}

function gameOver(){
  gameState = 'gameover';
  cancelAnimationFrame(animFrame);
  const overlay = document.getElementById('overlay');
  overlay.className = 'gameover';
  const isNewBest = score >= bestScore && score > 0;
  overlay.innerHTML = `
    <div class="bird-icon">💥</div>
    <div class="game-title">GAME OVER</div>
    <div style="text-align:center">
      <div style="font-family:Orbitron,monospace;font-size:11px;letter-spacing:2px;color:#666;margin-bottom:6px">FINAL SCORE</div>
      <div class="final-score">${score}</div>
      ${isNewBest?'<div class="new-best">✦ NEW BEST ✦</div>':''}
    </div>
    <div style="display:flex;gap:12px">
      <button class="play-btn" id="startBtn" style="padding:12px 28px;font-size:11px">▶ RETRY</button>
      <button class="play-btn" onclick="history.back()" style="padding:12px 28px;font-size:11px;background:linear-gradient(135deg,#555,#333);color:#fff;box-shadow:none">← HUB</button>
    </div>
  `;
  overlay.style.display='flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  initGame();
  animFrame = requestAnimationFrame(gameLoop);
}

function flap(){
  if(gameState==='playing' && !paused){
    bird.vy = bird.jump;
    bird.trail = [];
  }
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); flap(); }
  if(e.code==='KeyP') paused=!paused;
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); flap(); });

// Init best score display
document.getElementById('bestDisplay').textContent = getBest();

// Draw static canvas until start
drawBackground();
</script>
</body>
</html>
