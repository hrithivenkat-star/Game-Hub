<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders – GameHub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--cyan:#00f5ff;--pink:#ff006e;--green:#39ff14;--yellow:#ffe600;--purple:#bf00ff;--orange:#ff6600;--bg:#050a0f;--card:#0d1117;--border:rgba(0,245,255,0.15);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fff;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite;pointer-events:none;z-index:0;}
  @keyframes gridMove{from{background-position:0 0}to{background-position:0 40px}}
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(5,10,15,0.9);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:100;}
  .back-btn{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--cyan);text-decoration:none;padding:8px 18px;border:1px solid var(--cyan);border-radius:4px;background:rgba(0,245,255,0.05);transition:all 0.2s;cursor:pointer;}
  .back-btn:hover{background:rgba(0,245,255,0.15);box-shadow:0 0 18px rgba(0,245,255,0.4);transform:translateX(-2px);}
  .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:18px;}
  .logo span:first-child{color:#fff;}
  .logo span:last-child{color:var(--cyan);}
  .difficulty-badge{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:6px 14px;background:rgba(0,245,255,0.15);border:1px solid var(--cyan);color:var(--cyan);border-radius:4px;box-shadow:0 0 12px rgba(0,245,255,0.3);}
  .game-layout{display:flex;align-items:center;justify-content:center;gap:24px;padding-top:70px;position:relative;z-index:1;}
  .stats-panel{display:flex;flex-direction:column;gap:12px;width:150px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .stat-card.score::before{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .stat-card.best::before{background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  .stat-card.lives::before{background:var(--pink);box-shadow:0 0 8px var(--pink);}
  .stat-card.level::before{background:var(--purple);box-shadow:0 0 8px var(--purple);}
  .stat-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:#666;margin-bottom:6px;}
  .stat-value{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;}
  .stat-card.score .stat-value{color:var(--cyan);text-shadow:0 0 15px var(--cyan);}
  .stat-card.best .stat-value{color:var(--yellow);text-shadow:0 0 15px var(--yellow);}
  .stat-card.lives .stat-value{color:var(--pink);text-shadow:0 0 15px var(--pink);}
  .stat-card.level .stat-value{color:var(--purple);text-shadow:0 0 15px var(--purple);}
  .canvas-wrapper{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(0,245,255,0.15),0 0 120px rgba(57,255,20,0.1);border:1px solid var(--border);}
  canvas{display:block;}
  .right-panel{display:flex;flex-direction:column;gap:16px;width:160px;}
  .controls-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
  .controls-title{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;color:#666;margin-bottom:10px;}
  .control-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .key-badge{font-family:'Orbitron',monospace;font-size:9px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:3px;padding:3px 7px;color:#aaa;min-width:50px;text-align:center;}
  .key-desc{font-size:13px;color:#666;}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,10,15,0.88);backdrop-filter:blur(4px);z-index:10;gap:20px;border-radius:12px;}
  .game-title{font-family:'Orbitron',monospace;font-weight:900;font-size:30px;background:linear-gradient(135deg,var(--cyan),var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;}
  .game-subtitle{font-size:14px;color:#666;letter-spacing:1px;text-align:center;line-height:1.6;}
  .play-btn{font-family:'Orbitron',monospace;font-weight:700;font-size:13px;letter-spacing:3px;padding:14px 40px;border:none;border-radius:6px;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 0 30px rgba(0,245,255,0.4);}
  .play-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(0,245,255,0.6);}
  .final-score{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:var(--cyan);text-shadow:0 0 30px var(--cyan);}
  .new-best{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;color:var(--yellow);animation:blink 0.8s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  #particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← MINI GAMES</button>
  <div class="logo"><span>GAME</span><span>HUB</span></div>
  <div class="difficulty-badge">MEDIUM</div>
</div>
<div class="game-layout">
  <div class="stats-panel">
    <div class="stat-card score"><div class="stat-label">SCORE</div><div class="stat-value" id="scoreDisplay">0</div></div>
    <div class="stat-card best"><div class="stat-label">BEST</div><div class="stat-value" id="bestDisplay">0</div></div>
    <div class="stat-card lives"><div class="stat-label">LIVES</div><div class="stat-value" id="livesDisplay">3</div></div>
    <div class="stat-card level"><div class="stat-label">WAVE</div><div class="stat-value" id="levelDisplay">1</div></div>
  </div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="480" height="540"></canvas>
    <div id="overlay">
      <div style="font-size:52px;animation:birdFloat 2s ease-in-out infinite">👾</div>
      <div class="game-title">SPACE INVADERS</div>
      <div class="game-subtitle">Shoot the alien waves before they reach you.<br>Get harder with every level.</div>
      <button class="play-btn" id="startBtn">▶ START GAME</button>
    </div>
  </div>
  <div class="right-panel">
    <div class="controls-card">
      <div class="controls-title">CONTROLS</div>
      <div class="control-row"><span class="key-badge">← →</span><span class="key-desc">Move</span></div>
      <div class="control-row"><span class="key-badge">SPACE</span><span class="key-desc">Shoot</span></div>
      <div class="control-row"><span class="key-badge">P</span><span class="key-desc">Pause</span></div>
    </div>
    <div class="controls-card">
      <div class="controls-title">SCORING</div>
      <div style="font-size:12px;color:#666;line-height:1.8">
        <div>👾 Bottom row: <span style="color:var(--cyan)">10 pts</span></div>
        <div>👾 Mid row: <span style="color:var(--green)">20 pts</span></div>
        <div>👾 Top row: <span style="color:var(--yellow)">30 pts</span></div>
        <div>🛸 UFO: <span style="color:var(--pink)">50-150 pts</span></div>
      </div>
    </div>
  </div>
</div>
<script>
// Background particles
const pCanvas=document.getElementById('particles');
const pCtx=pCanvas.getContext('2d');
pCanvas.width=window.innerWidth;pCanvas.height=window.innerHeight;
const pts=Array.from({length:60},()=>({x:Math.random()*pCanvas.width,y:Math.random()*pCanvas.height,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,c:['#00f5ff','#ff006e','#39ff14','#ffe600','#bf00ff'][Math.floor(Math.random()*5)],a:Math.random()*0.4+0.1}));
function animPts(){pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=pCanvas.width;if(p.x>pCanvas.width)p.x=0;if(p.y<0)p.y=pCanvas.height;if(p.y>pCanvas.height)p.y=0;pCtx.beginPath();pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);pCtx.fillStyle=p.c;pCtx.globalAlpha=p.a;pCtx.fill();});pCtx.globalAlpha=1;requestAnimationFrame(animPts);}
animPts();

const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
let player,aliens,bullets,alienBullets,score,bestScore,lives,level,gameState,paused;
let alienDir=1,alienSpeed=0.5,alienDropped=false,frameCount=0;
let explosions=[],ufo=null,ufoTimer=0;
let keys={};

function getBest(){return parseInt(localStorage.getItem('space_best')||'0');}
function setBest(v){localStorage.setItem('space_best',v);const p=parseInt(localStorage.getItem('total_plays')||'0');localStorage.setItem('total_plays',p+1);}

const ALIEN_COLORS=[
  {main:'#ff006e',glow:'rgba(255,0,110,0.6)'},  // bottom row
  {main:'#00f5ff',glow:'rgba(0,245,255,0.6)'},  // mid rows
  {main:'#ffe600',glow:'rgba(255,230,0,0.6)'},  // top rows
];

function initGame(){
  player={x:W/2,y:H-50,w:44,h:20,speed:4,color:'#00f5ff'};
  score=0;lives=3;level=1;paused=false;frameCount=0;
  bestScore=getBest();
  bullets=[];alienBullets=[];explosions=[];ufo=null;
  spawnAliens();
  alienDir=1;alienSpeed=0.5;
  gameState='playing';
  updateDisplays();
}

function spawnAliens(){
  aliens=[];
  const rows=4,cols=10;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      let colorIdx=r===0?2:(r<=2?1:0);
      aliens.push({x:40+c*40,y:60+r*40,w:28,h:22,alive:true,
        color:ALIEN_COLORS[colorIdx],points:r===0?30:(r<=2?20:10),frame:0});
    }
  }
}

function updateDisplays(){
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('bestDisplay').textContent=bestScore;
  document.getElementById('livesDisplay').textContent=lives;
  document.getElementById('levelDisplay').textContent=level;
}

function drawBg(){
  ctx.fillStyle='#050a0f';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,245,255,0.03)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Ground line
  ctx.strokeStyle='rgba(0,245,255,0.3)';ctx.lineWidth=2;
  ctx.shadowColor='#00f5ff';ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(0,H-30);ctx.lineTo(W,H-30);ctx.stroke();
  ctx.shadowBlur=0;
}

function drawPlayer(){
  ctx.save();
  ctx.shadowColor=player.color;ctx.shadowBlur=20;
  // Ship body
  const g=ctx.createLinearGradient(player.x-player.w/2,0,player.x+player.w/2,0);
  g.addColorStop(0,'rgba(0,100,150,0.8)');g.addColorStop(0.5,'#00f5ff');g.addColorStop(1,'rgba(0,100,150,0.8)');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-player.h);
  ctx.lineTo(player.x-player.w/2,player.y+2);
  ctx.lineTo(player.x+player.w/2,player.y+2);
  ctx.closePath();ctx.fill();
  // Cockpit
  ctx.fillStyle='rgba(0,245,255,0.4)';
  ctx.beginPath();ctx.ellipse(player.x,player.y-8,8,10,0,0,Math.PI*2);ctx.fill();
  // Engine glow
  ctx.fillStyle='rgba(0,245,255,0.6)';
  ctx.beginPath();ctx.ellipse(player.x,player.y+5,6,3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawAlien(a){
  if(!a.alive)return;
  ctx.save();
  ctx.shadowColor=a.color.main;ctx.shadowBlur=15;
  // Alien body (simple pixel-art style)
  const x=a.x,y=a.y,w=a.w,h=a.h;
  ctx.fillStyle=a.color.main;
  // Body
  ctx.fillRect(x-w/2+4,y-h/2+6,w-8,h-8);
  // Head
  ctx.fillRect(x-w/2+8,y-h/2,w-16,8);
  // Antennae
  ctx.fillRect(x-w/2+4,y-h/2-6,4,8);
  ctx.fillRect(x+w/2-8,y-h/2-6,4,8);
  // Eyes
  ctx.fillStyle='#000';
  ctx.fillRect(x-6,y-h/2+8,4,4);
  ctx.fillRect(x+2,y-h/2+8,4,4);
  // Legs (animated)
  const t=a.frame%2===0;
  ctx.fillStyle=a.color.main;
  ctx.fillRect(x-w/2+2,y+h/2-4+(t?2:0),5,6);
  ctx.fillRect(x-4,y+h/2-4+(t?0:2),5,6);
  ctx.fillRect(x+w/2-7,y+h/2-4+(t?2:0),5,6);
  ctx.restore();
}

function drawUFO(){
  if(!ufo)return;
  ctx.save();
  ctx.shadowColor='#ff006e';ctx.shadowBlur=25;
  ctx.fillStyle='#ff006e';
  ctx.beginPath();ctx.ellipse(ufo.x,ufo.y,30,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,0,110,0.4)';
  ctx.beginPath();ctx.ellipse(ufo.x,ufo.y-8,14,8,0,0,Math.PI*2);ctx.fill();
  // Lights
  [-16,-8,0,8,16].forEach((ox,i)=>{
    ctx.fillStyle=i%2===0?'#ff6600':'#ffe600';
    ctx.beginPath();ctx.arc(ufo.x+ox,ufo.y+2,2,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();ctx.shadowColor='#00f5ff';ctx.shadowBlur=12;
    ctx.fillStyle='#00f5ff';
    ctx.fillRect(b.x-2,b.y-8,4,14);
    ctx.restore();
  });
  alienBullets.forEach(b=>{
    ctx.save();ctx.shadowColor=b.color||'#ff006e';ctx.shadowBlur=10;
    ctx.fillStyle=b.color||'#ff006e';
    ctx.fillRect(b.x-2,b.y,4,12);
    ctx.restore();
  });
}

function drawExplosions(){
  explosions=explosions.filter(e=>e.life>0);
  explosions.forEach(e=>{
    e.life-=0.04;
    e.parts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      ctx.save();ctx.globalAlpha=e.life;
      ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=6;
      ctx.fillRect(p.x,p.y,3,3);ctx.restore();
    });
  });
}

function spawnExplosion(x,y,color){
  const parts=Array.from({length:16},()=>({
    x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,
    c:color
  }));
  explosions.push({life:1,parts});
}

function gameLoop(){
  if(paused){requestAnimationFrame(gameLoop);return;}
  drawBg();
  frameCount++;

  // Move player
  if(keys['ArrowLeft']||keys['KeyA'])player.x=Math.max(30,player.x-player.speed);
  if(keys['ArrowRight']||keys['KeyD'])player.x=Math.min(W-30,player.x+player.speed);

  // Alien movement
  const aliveAliens=aliens.filter(a=>a.alive);
  if(aliveAliens.length===0){level++;alienSpeed+=0.3;spawnAliens();alienDir=1;return;}
  const maxX=Math.max(...aliveAliens.map(a=>a.x));
  const minX=Math.min(...aliveAliens.map(a=>a.x));
  if(maxX>W-30||minX<30){
    alienDir*=-1;
    aliens.forEach(a=>{a.y+=18;});
  }
  aliens.forEach((a,i)=>{
    if(a.alive){a.x+=alienDir*(alienSpeed+(level-1)*0.2);if(frameCount%30===0)a.frame++;}
  });

  // UFO
  ufoTimer++;
  if(ufoTimer>400&&!ufo){ufo={x:-30,y:28,speed:1.5+(level*0.3)};ufoTimer=0;}
  if(ufo){ufo.x+=ufo.speed;if(ufo.x>W+40)ufo=null;}

  // Alien shooting
  if(frameCount%Math.max(20,60-level*8)===0){
    const cols={};
    aliveAliens.forEach(a=>{const c=Math.round(a.x/40);if(!cols[c]||cols[c].y<a.y)cols[c]=a;});
    Object.values(cols).forEach(a=>{
      if(Math.random()<0.4){
        alienBullets.push({x:a.x,y:a.y,speed:3+level*0.4,color:a.color.main});
      }
    });
  }

  // Player shooting
  if(keys['Space']&&frameCount%18===0){
    bullets.push({x:player.x,y:player.y-player.h});
  }

  // Update bullets
  bullets.forEach(b=>b.y-=9);
  alienBullets.forEach(b=>b.y+=b.speed);
  // Filter
  bullets=bullets.filter(b=>b.y>0);
  alienBullets=alienBullets.filter(b=>b.y<H);

  // Bullet-alien collisions
  bullets.forEach((b,bi)=>{
    aliens.forEach(a=>{
      if(a.alive&&Math.abs(b.x-a.x)<16&&Math.abs(b.y-a.y)<14){
        a.alive=false;bullets[bi]=null;
        score+=a.points;
        if(score>bestScore){bestScore=score;setBest(bestScore);}
        spawnExplosion(a.x,a.y,a.color.main);
        updateDisplays();
      }
    });
    // UFO hit
    if(ufo&&Math.abs(b.x-ufo.x)<32&&Math.abs(b.y-ufo.y)<12){
      const pts=50+Math.floor(Math.random()*5)*20;
      score+=pts;if(score>bestScore){bestScore=score;setBest(bestScore);}
      spawnExplosion(ufo.x,ufo.y,'#ff006e');
      ufo=null;bullets[bi]=null;updateDisplays();
    }
  });
  bullets=bullets.filter(Boolean);

  // Alien bullet-player collision
  alienBullets.forEach((b,bi)=>{
    if(Math.abs(b.x-player.x)<22&&Math.abs(b.y-player.y)<16){
      lives--;alienBullets[bi]=null;
      spawnExplosion(player.x,player.y,'#00f5ff');
      updateDisplays();
      if(lives<=0){gameOver();return;}
    }
  });
  alienBullets=alienBullets.filter(Boolean);

  // Aliens reached bottom
  if(aliveAliens.some(a=>a.y>H-60)){gameOver();return;}

  drawExplosions();
  aliens.forEach(drawAlien);
  drawUFO();
  drawPlayer();
  drawBullets();

  // Lives display on canvas
  for(let i=0;i<lives;i++){
    ctx.save();ctx.shadowColor='#00f5ff';ctx.shadowBlur=10;ctx.fillStyle='#00f5ff';
    ctx.font='14px Rajdhani';ctx.fillText('▲',10+i*20,H-10);ctx.restore();
  }

  if(gameState==='playing')requestAnimationFrame(gameLoop);
}

function gameOver(){
  gameState='gameover';
  const overlay=document.getElementById('overlay');
  overlay.style.display='flex';
  const isNewBest=score>=bestScore&&score>0;
  overlay.innerHTML=`
    <div style="font-size:48px">💥</div>
    <div class="game-title" style="background:linear-gradient(135deg,#ff006e,#ff6600,#ffe600);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GAME OVER</div>
    <div style="text-align:center">
      <div style="font-family:Orbitron,monospace;font-size:11px;letter-spacing:2px;color:#666;margin-bottom:6px">FINAL SCORE</div>
      <div class="final-score">${score}</div>
      ${isNewBest?'<div class="new-best">✦ NEW BEST ✦</div>':''}
    </div>
    <div style="display:flex;gap:12px">
      <button class="play-btn" id="startBtn" style="padding:12px 28px;font-size:11px">▶ RETRY</button>
      <button class="play-btn" onclick="history.back()" style="padding:12px 28px;font-size:11px;background:linear-gradient(135deg,#333,#222);color:#fff;box-shadow:none">← HUB</button>
    </div>
  `;
  document.getElementById('startBtn').onclick=startGame;
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  initGame();
  requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault();if(e.code==='KeyP')paused=!paused;});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.getElementById('bestDisplay').textContent=getBest();
drawBg();
</script>
</body>
</html>
