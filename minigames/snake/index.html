<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake — GameHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --grid: #0a1628;
    --cyan: #00f5ff;
    --green: #00ff88;
    --pink: #ff0080;
    --yellow: #ffee00;
    --purple: #bf00ff;
    --orange: #ff6600;
    --text: #e0f0ff;
    --panel: rgba(0,245,255,0.05);
    --border: rgba(0,245,255,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Share Tech Mono',monospace; color:var(--text); }

  /* Scanlines */
  body::before {
    content:''; position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events:none; z-index:1000;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; height:52px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
    background:rgba(2,4,8,0.95);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(10px);
    z-index:100;
  }
  nav a { color:var(--cyan); text-decoration:none; font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; opacity:0.7; transition:opacity 0.2s; }
  nav a:hover { opacity:1; }
  .nav-logo { font-family:'Orbitron',monospace; font-size:14px; font-weight:900; color:var(--cyan); letter-spacing:3px; text-shadow:0 0 20px var(--cyan); }

  /* STATS BAR */
  .stats-bar {
    position:fixed; top:52px; left:0; right:0; height:44px;
    display:flex; align-items:center; justify-content:center; gap:40px;
    background:rgba(2,4,8,0.9); border-bottom:1px solid var(--border);
    z-index:99;
  }
  .stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .stat-label { font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:2px; }
  .stat-value { font-size:16px; color:var(--cyan); font-family:'Orbitron',monospace; font-weight:700; text-shadow:0 0 10px var(--cyan); }

  /* MAIN LAYOUT */
  .game-wrap {
    position:fixed; top:96px; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center;
    padding:10px;
  }

  /* CANVAS CONTAINER */
  .canvas-box {
    position:relative;
    border:1px solid var(--border);
    box-shadow:0 0 40px rgba(0,245,255,0.1), inset 0 0 40px rgba(0,0,0,0.5);
    border-radius:4px;
    overflow:hidden;
  }
  canvas { display:block; }

  /* OVERLAY */
  .overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(2,4,8,0.92);
    gap:16px;
    transition:opacity 0.3s;
  }
  .overlay.hidden { opacity:0; pointer-events:none; }

  .overlay-title {
    font-family:'Orbitron',monospace; font-weight:900; font-size:clamp(28px,5vw,52px);
    color:var(--cyan); text-shadow:0 0 30px var(--cyan), 0 0 60px rgba(0,245,255,0.4);
    letter-spacing:4px;
  }
  .overlay-sub { font-size:12px; color:rgba(255,255,255,0.5); letter-spacing:2px; text-align:center; }
  .overlay-score { font-family:'Orbitron',monospace; font-size:20px; color:var(--yellow); text-shadow:0 0 15px var(--yellow); }

  .btn {
    padding:12px 32px;
    font-family:'Orbitron',monospace; font-size:13px; font-weight:700; letter-spacing:3px;
    background:transparent; color:var(--cyan);
    border:2px solid var(--cyan);
    cursor:pointer;
    position:relative; overflow:hidden;
    transition:all 0.2s;
    text-transform:uppercase;
  }
  .btn::before {
    content:''; position:absolute; inset:0;
    background:var(--cyan); opacity:0;
    transition:opacity 0.2s;
  }
  .btn:hover::before { opacity:0.15; }
  .btn:hover { box-shadow:0 0 25px rgba(0,245,255,0.5); }
  .btn:active { transform:scale(0.97); }

  .new-best { color:var(--yellow); font-family:'Orbitron',monospace; font-size:13px; letter-spacing:2px; text-shadow:0 0 15px var(--yellow); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* LEVEL INDICATOR */
  .level-badge {
    position:absolute; top:8px; right:8px;
    font-family:'Orbitron',monospace; font-size:10px; color:var(--green);
    background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3);
    padding:3px 8px; border-radius:2px;
  }

  /* MOBILE D-PAD */
  .dpad {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    display:none; flex-direction:column; align-items:center; gap:4px;
    z-index:200;
  }
  .dpad-row { display:flex; gap:4px; }
  .dpad-btn {
    width:54px; height:54px;
    background:rgba(0,245,255,0.08);
    border:2px solid rgba(0,245,255,0.3);
    border-radius:8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; color:var(--cyan);
    user-select:none; -webkit-user-select:none;
    active:background:rgba(0,245,255,0.2);
    transition:background 0.1s;
  }
  .dpad-btn:active { background:rgba(0,245,255,0.25); }

  @media (max-width:640px) or (hover:none) {
    .dpad { display:flex; }
    .game-wrap { bottom:180px; }
  }
  @media (max-width:400px) {
    .dpad-btn { width:46px; height:46px; font-size:18px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/index.html">← GAMEHUB</a>
  <span class="nav-logo">🐍 SNAKE</span>
  <a href="/minigames/index.html">MINI GAMES</a>
</nav>

<div class="stats-bar">
  <div class="stat"><span class="stat-label">SCORE</span><span class="stat-value" id="score">0</span></div>
  <div class="stat"><span class="stat-label">BEST</span><span class="stat-value" id="best">0</span></div>
  <div class="stat"><span class="stat-label">LEVEL</span><span class="stat-value" id="level">1</span></div>
  <div class="stat"><span class="stat-label">LENGTH</span><span class="stat-value" id="length">1</span></div>
</div>

<div class="game-wrap">
  <div class="canvas-box" id="canvasBox">
    <canvas id="canvas"></canvas>
    <div class="level-badge" id="levelBadge">LVL 1</div>

    <!-- START -->
    <div class="overlay" id="startOverlay">
      <div class="overlay-title">SNAKE</div>
      <div class="overlay-sub">EAT. GROW. SURVIVE.</div>
      <button class="btn" id="startBtn">▶ PLAY</button>
      <div class="overlay-sub" style="margin-top:8px">ARROWS / WASD / SWIPE</div>
    </div>

    <!-- GAMEOVER -->
    <div class="overlay hidden" id="gameoverOverlay">
      <div class="overlay-title" style="color:var(--pink);text-shadow:0 0 30px var(--pink)">GAME OVER</div>
      <div id="newBestMsg" class="new-best hidden">⚡ NEW BEST!</div>
      <div class="overlay-score">SCORE: <span id="finalScore">0</span></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4)">BEST: <span id="finalBest">0</span></div>
      <button class="btn" id="restartBtn">↺ PLAY AGAIN</button>
      <a href="/minigames/index.html" style="color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:2px">← BACK</a>
    </div>

    <!-- PAUSE -->
    <div class="overlay hidden" id="pauseOverlay">
      <div class="overlay-title" style="font-size:36px">PAUSED</div>
      <button class="btn" id="resumeBtn">▶ RESUME</button>
    </div>
  </div>
</div>

<!-- D-PAD -->
<div class="dpad" id="dpad">
  <div class="dpad-row"><div class="dpad-btn" data-dir="UP">↑</div></div>
  <div class="dpad-row">
    <div class="dpad-btn" data-dir="LEFT">←</div>
    <div class="dpad-btn" data-dir="DOWN">↓</div>
    <div class="dpad-btn" data-dir="RIGHT">→</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasBox = document.getElementById('canvasBox');

// Responsive sizing
let COLS = 20, ROWS = 20, CELL;
function resize() {
  const wrap = canvasBox.parentElement;
  const ww = wrap.clientWidth - 20;
  const wh = wrap.clientHeight - 20;
  const size = Math.min(ww, wh, 520);
  CELL = Math.floor(size / COLS);
  const actual = CELL * COLS;
  canvas.width = actual; canvas.height = actual;
  canvasBox.style.width = actual + 'px';
  canvasBox.style.height = actual + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if(running) draw(); });

// Game state
let snake, dir, nextDir, food, special, score, best, level, gameLoop, running, paused, dead;
best = parseInt(localStorage.getItem('snake_best') || '0');
document.getElementById('best').textContent = best;

const SPEEDS = [150,130,110,95,80,68,58,50,44,38]; // ms per frame by level
function getSpeed() { return SPEEDS[Math.min(level-1, SPEEDS.length-1)]; }

function init() {
  const mid = Math.floor(COLS/2);
  snake = [{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; level = 1; dead = false; paused = false;
  placeFood(); special = null;
  updateHUD();
}

function placeFood() {
  do { food = {x:rnd(COLS), y:rnd(ROWS)}; }
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function placeSpecial() {
  do { special = {x:rnd(COLS), y:rnd(ROWS), timer:150}; }
  while(snake.some(s=>s.x===special.x&&s.y===special.y) || (food.x===special.x&&food.y===special.y));
}

function rnd(n) { return Math.floor(Math.random()*n); }

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
  document.getElementById('length').textContent = snake.length;
  document.getElementById('levelBadge').textContent = 'LVL '+level;
}

function step() {
  if(paused||dead) return;
  dir = {...nextDir};
  const head = {x: (snake[0].x+dir.x+COLS)%COLS, y: (snake[0].y+dir.y+ROWS)%ROWS};

  if(snake.some(s=>s.x===head.x&&s.y===head.y)) { gameOver(); return; }
  snake.unshift(head);

  let ate = false;
  if(head.x===food.x && head.y===food.y) {
    score += 10 * level; ate = true;
    const newLevel = Math.floor(snake.length / 5) + 1;
    if(newLevel > level) { level = newLevel; }
    placeFood();
    if(snake.length % 8 === 0) placeSpecial();
    if(score > best) { best = score; localStorage.setItem('snake_best', best); }
    updateHUD();
    flashHead();
  }

  if(special) {
    if(head.x===special.x && head.y===special.y) {
      score += 50 * level; ate = true;
      if(score > best) { best = score; localStorage.setItem('snake_best', best); }
      special = null; updateHUD();
    } else {
      special.timer--;
      if(special.timer <= 0) special = null;
    }
  }

  if(!ate) snake.pop();
  draw();
  reschedule();
}

let flashTimer = 0;
function flashHead() { flashTimer = 6; }

let loopTimeout;
function reschedule() {
  clearTimeout(loopTimeout);
  loopTimeout = setTimeout(step, getSpeed());
}

function startGame() {
  init();
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameoverOverlay').classList.add('hidden');
  running = true;
  draw();
  reschedule();
}

function gameOver() {
  dead = true; clearTimeout(loopTimeout);
  const isNew = score > 0 && score >= best;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = best;
  document.getElementById('newBestMsg').classList.toggle('hidden', !isNew);
  document.getElementById('gameoverOverlay').classList.remove('hidden');
}

// DRAWING
const COLORS = {
  head: '#00f5ff',
  body1: '#00c8d4',
  body2: '#008fa0',
  food: '#ff0080',
  special: '#ffee00',
  grid: '#0a1628'
};

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  for(let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
  for(let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }

  // Food (pulsing)
  const ft = Date.now()/500;
  const fpulse = 0.85 + 0.15*Math.sin(ft*Math.PI*2);
  ctx.save();
  ctx.shadowBlur = 20*fpulse; ctx.shadowColor = COLORS.food;
  ctx.fillStyle = COLORS.food;
  const fc = CELL*0.35*fpulse;
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, fc, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Special
  if(special) {
    const sp = Date.now()/300;
    const spulse = 0.8+0.2*Math.sin(sp*Math.PI*2);
    ctx.save();
    ctx.shadowBlur = 25*spulse; ctx.shadowColor = COLORS.special;
    ctx.fillStyle = COLORS.special;
    ctx.font = `${CELL*0.8}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.globalAlpha = Math.min(1, special.timer/30);
    ctx.fillText('⭐', special.x*CELL+CELL/2, special.y*CELL+CELL/2);
    ctx.restore();
  }

  // Snake
  snake.forEach((seg, i) => {
    const r = Math.max(2, CELL*0.12);
    const isHead = i === 0;
    const t = i/snake.length;
    const alpha = isHead ? 1 : 0.9 - t*0.5;

    ctx.save();
    if(isHead && flashTimer > 0) {
      ctx.shadowBlur = 30; ctx.shadowColor = '#fff';
      flashTimer--;
    } else {
      ctx.shadowBlur = isHead ? 18 : 8;
      ctx.shadowColor = isHead ? COLORS.head : COLORS.body1;
    }

    // Color gradient along body
    let c;
    if(isHead) c = COLORS.head;
    else {
      const r1 = lerp(0, 0, t), g1 = lerp(245,200,t), b1 = lerp(255,160,t);
      c = `rgba(${Math.round(r1)},${Math.round(g1)},${Math.round(b1)},${alpha})`;
    }
    ctx.fillStyle = c;

    const pad = isHead ? 1 : 2;
    roundRect(ctx, seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, r);
    ctx.fill();

    // Eyes on head
    if(isHead) {
      ctx.fillStyle = '#000';
      ctx.shadowBlur = 0;
      const ex = dir.x, ey = dir.y;
      const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
      const es = CELL*0.12;
      // position eyes based on direction
      let e1x,e1y,e2x,e2y;
      if(ex===1){e1x=cx+CELL*0.2;e1y=cy-CELL*0.15;e2x=cx+CELL*0.2;e2y=cy+CELL*0.15;}
      else if(ex===-1){e1x=cx-CELL*0.2;e1y=cy-CELL*0.15;e2x=cx-CELL*0.2;e2y=cy+CELL*0.15;}
      else if(ey===1){e1x=cx-CELL*0.15;e1y=cy+CELL*0.2;e2x=cx+CELL*0.15;e2y=cy+CELL*0.2;}
      else{e1x=cx-CELL*0.15;e1y=cy-CELL*0.2;e2x=cx+CELL*0.15;e2y=cy-CELL*0.2;}
      ctx.beginPath(); ctx.arc(e1x,e1y,es,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x,e2y,es,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function lerp(a,b,t){return a+(b-a)*t;}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// CONTROLS
const dirMap = {
  ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
  w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
  W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}
};
const dpadMap = { UP:{x:0,y:-1}, DOWN:{x:0,y:1}, LEFT:{x:-1,y:0}, RIGHT:{x:1,y:0} };

document.addEventListener('keydown', e => {
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(e.key === 'p' || e.key === 'P' || e.key === 'Escape') { togglePause(); return; }
  if(!running) return;
  const d = dirMap[e.key];
  if(d && !(d.x===-dir.x&&d.y===0) && !(d.y===-dir.y&&d.x===0)) nextDir = d;
});

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const handler = e => {
    e.preventDefault();
    if(!running) return;
    const d = dpadMap[btn.dataset.dir];
    if(d && !(d.x===-dir.x&&d.y===0) && !(d.y===-dir.y&&d.x===0)) nextDir = d;
  };
  btn.addEventListener('touchstart', handler, {passive:false});
  btn.addEventListener('mousedown', handler);
});

function togglePause() {
  if(!running || dead) return;
  paused = !paused;
  document.getElementById('pauseOverlay').classList.toggle('hidden', !paused);
  if(!paused) reschedule();
}

// Touch swipe
let tx=0,ty=0;
canvas.addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;}, {passive:true});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
  if(!running) return;
  let d;
  if(Math.abs(dx)>Math.abs(dy)) d = dx>0?{x:1,y:0}:{x:-1,y:0};
  else d = dy>0?{x:0,y:1}:{x:0,y:-1};
  if(!(d.x===-dir.x&&d.y===0) && !(d.y===-dir.y&&d.x===0)) nextDir = d;
}, {passive:true});

// Buttons
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

// Animate when idle
function idleAnim() {
  if(!running) { draw(); } // static for now
  requestAnimationFrame(idleAnim);
}
// Continuous render for food pulsing
let animFrame;
function renderLoop() {
  if(running && !paused && !dead) { /* step handles draw */ }
  else if(!running || paused) draw();
  animFrame = requestAnimationFrame(renderLoop);
}
renderLoop();

// Initial draw
resize(); init();
// Draw a "preview" snake
snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10},{x:6,y:10}];
dir={x:1,y:0}; nextDir={x:1,y:0};
draw();
</script>
</body>
</html>
