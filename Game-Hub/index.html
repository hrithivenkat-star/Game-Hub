<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Welcome to Game Hub</h1>

  <!-- Nickname prompt -->
  <div id="nickname-prompt">
    <input type="text" id="nickname" placeholder="Enter your nickname">
    <button onclick="saveNickname()">Start</button>
  </div>

  <!-- Mode buttons -->
  <div id="game-modes" style="display:none;">
    <button onclick="openMode('minigames')">Mini-Games</button>
    <button onclick="openMode('multiplayer')">Multiplayer Online</button>
    <button onclick="openMode('timed')">Timed Challenge</button>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
