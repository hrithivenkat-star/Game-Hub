<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Game Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  :root {
    --neon-cyan: #00f5ff;
    --neon-green: #00ff88;
    --neon-red: #ff003c;
    --neon-purple: #bf00ff;
    --neon-yellow: #ffe600;
    --bg-dark: #050510;
    --bg-card: #0a0a1a;
    --text-dim: #6677aa;
  }
 
  html, body {
    min-height: 100vh;
    background: var(--bg-dark);
    color: #e0e8ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
 
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
 
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }
  .scanline {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(transparent, rgba(0,255,136,0.03), transparent);
    animation: scanline 8s linear infinite;
    pointer-events: none; z-index: 0;
  }
 
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.92); }
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,255,136,0.3); }
    50% { box-shadow: 0 0 40px rgba(0,255,136,0.6); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes score-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
 
  /* NAV */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(0,255,136,0.1);
    background: rgba(5,5,16,0.9);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900;
    color: var(--neon-cyan); text-decoration: none;
    text-shadow: 0 0 15px rgba(0,245,255,0.5);
  }
  .logo span { color: var(--neon-purple); }
  .back-btn {
    color: var(--text-dim); text-decoration: none;
    font-size: 13px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 7px 16px; border-radius: 6px;
  }
  .back-btn:hover { color: var(--neon-green); border-color: rgba(0,255,136,0.3); }
 
  /* MAIN LAYOUT */
  .game-wrapper {
    position: relative; z-index: 1;
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px; gap: 24px; flex-wrap: wrap;
  }
 
  /* SIDE PANEL */
  .side-panel {
    display: flex; flex-direction: column; gap: 14px;
    width: 180px; flex-shrink: 0;
  }
 
  .panel-card {
    background: var(--bg-card);
    border: 1px solid rgba(0,255,136,0.1);
    border-radius: 12px; padding: 16px;
    text-align: center;
  }
  .panel-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .panel-value {
    font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 700;
    color: var(--neon-green);
    text-shadow: 0 0 15px rgba(0,255,136,0.6);
  }
  .panel-value.best {
    font-size: 22px; color: var(--neon-yellow);
    text-shadow: 0 0 15px rgba(255,230,0,0.5);
  }
  .panel-value.level {
    font-size: 22px; color: var(--neon-cyan);
    text-shadow: 0 0 15px rgba(0,245,255,0.5);
  }
 
  .score-pop { animation: score-pop 0.3s ease; }
 
  /* Controls card */
  .controls-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px; padding: 14px;
  }
  .controls-title {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; text-align: center;
  }
  .key-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .key {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; padding: 3px 8px;
    font-family: 'Orbitron', monospace; font-size: 10px; color: #aabbdd;
    min-width: 32px; text-align: center;
  }
  .key-desc { font-size: 11px; color: var(--text-dim); }
 
  /* CANVAS AREA */
  .canvas-container {
    position: relative; flex-shrink: 0;
  }
  .canvas-glow {
    position: absolute; inset: -2px;
    border-radius: 14px;
    background: transparent;
    border: 2px solid rgba(0,255,136,0.2);
    box-shadow:
      0 0 20px rgba(0,255,136,0.1),
      0 0 40px rgba(0,255,136,0.05),
      inset 0 0 20px rgba(0,255,136,0.02);
    pointer-events: none;
    animation: glow-pulse 2s ease-in-out infinite;
  }
  canvas {
    display: block; border-radius: 12px;
    background: #020208;
    border: 1px solid rgba(0,255,136,0.15);
  }
  canvas.shake { animation: shake 0.4s ease; }
 
  /* OVERLAY SCREENS */
  .overlay {
    position: absolute; inset: 0;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(2,2,8,0.92);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
 
  .overlay-icon { font-size: 48px; margin-bottom: 12px; }
  .overlay-title {
    font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900;
    margin-bottom: 6px; letter-spacing: 2px;
  }
  .overlay-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }
 
  .score-display {
    display: flex; gap: 20px; margin-bottom: 28px;
  }
  .score-box {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px 20px; text-align: center;
  }
  .score-box-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .score-box-val {
    font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700;
  }
 
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 12px 24px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-block; border: none;
  }
  .btn-green {
    background: rgba(0,255,136,0.15); color: var(--neon-green);
    border: 1px solid rgba(0,255,136,0.35);
  }
  .btn-green:hover { background: rgba(0,255,136,0.25); box-shadow: 0 0 20px rgba(0,255,136,0.3); transform: translateY(-2px); }
  .btn-dim {
    background: rgba(255,255,255,0.04); color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-dim:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateY(-2px); }
 
  /* START screen specifics */
  #start-screen .overlay-title { color: var(--neon-green); text-shadow: 0 0 20px rgba(0,255,136,0.6); }
  .start-tip {
    font-size: 13px; color: var(--text-dim);
    background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.1);
    border-radius: 8px; padding: 10px 20px; margin-top: 16px;
  }
 
  /* GAME OVER specifics */
  #gameover-screen .overlay-title { color: var(--neon-red); text-shadow: 0 0 20px rgba(255,0,60,0.6); }
  .new-best {
    font-family: 'Orbitron', monospace; font-size: 12px;
    color: var(--neon-yellow); letter-spacing: 2px;
    background: rgba(255,230,0,0.08); border: 1px solid rgba(255,230,0,0.2);
    border-radius: 6px; padding: 6px 14px; margin-bottom: 16px;
    display: none;
  }
  .new-best.show { display: block; }
</style>
</head>
<body>
 
<div class="scanline"></div>
 
<!-- NAV -->
<nav>
  <a href="../../index.html" class="logo">GAME<span>HUB</span></a>
  <a href="../index.html" class="back-btn">← Mini Games</a>
</nav>
 
<!-- GAME WRAPPER -->
<div class="game-wrapper">
 
  <!-- LEFT PANEL -->
  <div class="side-panel">
    <div class="panel-card">
      <div class="panel-label">Score</div>
      <div class="panel-value" id="score-display">0</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Best</div>
      <div class="panel-value best" id="best-display">0</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Level</div>
      <div class="panel-value level" id="level-display">1</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Length</div>
      <div class="panel-value" style="font-size:22px;color:#aabbdd;text-shadow:none" id="length-display">1</div>
    </div>
  </div>
 
  <!-- CANVAS -->
  <div class="canvas-container">
    <div class="canvas-glow"></div>
    <canvas id="gameCanvas" width="480" height="480"></canvas>
 
    <!-- START SCREEN -->
    <div class="overlay" id="start-screen">
      <div class="overlay-icon">🐍</div>
      <div class="overlay-title">SNAKE</div>
      <div class="overlay-sub">Eat the food. Grow. Don't die.</div>
      <div class="btn-row">
        <button class="btn btn-green" onclick="startGame()">Start Game</button>
      </div>
      <div class="start-tip">Use Arrow Keys or WASD to move</div>
    </div>
 
    <!-- GAME OVER SCREEN -->
    <div class="overlay hidden" id="gameover-screen">
      <div class="overlay-icon">💀</div>
      <div class="overlay-title">GAME OVER</div>
      <div class="new-best" id="new-best-badge">⚡ NEW BEST SCORE!</div>
      <div class="score-display">
        <div class="score-box">
          <div class="score-box-label">Score</div>
          <div class="score-box-val" id="final-score" style="color:var(--neon-green)">0</div>
        </div>
        <div class="score-box">
          <div class="score-box-label">Best</div>
          <div class="score-box-val" id="final-best" style="color:var(--neon-yellow)">0</div>
        </div>
        <div class="score-box">
          <div class="score-box-label">Length</div>
          <div class="score-box-val" id="final-length" style="color:var(--neon-cyan)">0</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-green" onclick="startGame()">Play Again</button>
        <a href="../index.html" class="btn btn-dim">← Hub</a>
      </div>
    </div>
 
  </div>
 
  <!-- RIGHT PANEL -->
  <div class="side-panel">
    <div class="controls-card">
      <div class="controls-title">Controls</div>
      <div class="key-row"><span class="key">↑ W</span><span class="key-desc">Move Up</span></div>
      <div class="key-row"><span class="key">↓ S</span><span class="key-desc">Move Down</span></div>
      <div class="key-row"><span class="key">← A</span><span class="key-desc">Move Left</span></div>
      <div class="key-row"><span class="key">→ D</span><span class="key-desc">Move Right</span></div>
      <div class="key-row"><span class="key">P</span><span class="key-desc">Pause</span></div>
    </div>
    <div class="panel-card" style="border-color:rgba(191,0,255,0.15)">
      <div class="panel-label">Speed</div>
      <div id="speed-bar" style="margin-top:8px;display:flex;gap:3px;justify-content:center">
      </div>
    </div>
    <div class="panel-card" style="border-color:rgba(255,230,0,0.1)">
      <div class="panel-label">Next Level</div>
      <div style="margin-top:8px;background:rgba(255,255,255,0.04);border-radius:4px;height:8px;overflow:hidden">
        <div id="level-progress" style="height:100%;background:var(--neon-yellow);border-radius:4px;width:0%;transition:width 0.3s;box-shadow:0 0 8px rgba(255,230,0,0.5)"></div>
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:6px" id="next-level-info">5 food to level 2</div>
    </div>
  </div>
 
</div>
 
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
 
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
 
let snake, dir, nextDir, food, score, bestScore, level, foodEaten, gameLoop, paused, running;
 
const SPEEDS = [150, 130, 110, 90, 75, 62, 52, 44, 37, 32];
const FOOD_PER_LEVEL = 5;
 
// Load best
bestScore = parseInt(localStorage.getItem('snake_best') || '0');
document.getElementById('best-display').textContent = bestScore;
 
function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9,  y: 10 },
    { x: 8,  y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  foodEaten = 0;
  paused = false;
  running = true;
  updateUI();
  placeFood();
  updateSpeedBar();
}
 
function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}
 
function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  if (gameLoop) clearInterval(gameLoop);
  init();
  gameLoop = setInterval(tick, SPEEDS[Math.min(level - 1, SPEEDS.length - 1)]);
}
 
function tick() {
  if (paused || !running) return;
  dir = { ...nextDir };
 
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
 
  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }
 
  snake.unshift(head);
 
  if (head.x === food.x && head.y === food.y) {
    score += level * 10;
    foodEaten++;
    checkLevelUp();
    placeFood();
    triggerScorePop();
  } else {
    snake.pop();
  }
 
  updateUI();
  draw();
}
 
function checkLevelUp() {
  if (foodEaten % FOOD_PER_LEVEL === 0) {
    level = Math.min(level + 1, 10);
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, SPEEDS[Math.min(level - 1, SPEEDS.length - 1)]);
    updateSpeedBar();
  }
}
 
function gameOver() {
  running = false;
  clearInterval(gameLoop);
  canvas.classList.add('shake');
  setTimeout(() => canvas.classList.remove('shake'), 400);
 
  let isNewBest = false;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('snake_best', bestScore);
    isNewBest = true;
  }
 
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-best').textContent = bestScore;
  document.getElementById('final-length').textContent = snake.length;
  document.getElementById('new-best-badge').classList.toggle('show', isNewBest);
  document.getElementById('gameover-screen').classList.remove('hidden');
}
 
function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent = bestScore;
  document.getElementById('level-display').textContent = level;
  document.getElementById('length-display').textContent = snake.length;
 
  const progress = ((foodEaten % FOOD_PER_LEVEL) / FOOD_PER_LEVEL) * 100;
  document.getElementById('level-progress').style.width = progress + '%';
  const remaining = FOOD_PER_LEVEL - (foodEaten % FOOD_PER_LEVEL);
  document.getElementById('next-level-info').textContent =
    level < 10 ? `${remaining} food to level ${level + 1}` : 'Max level!';
}
 
function triggerScorePop() {
  const el = document.getElementById('score-display');
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
}
 
function updateSpeedBar() {
  const bar = document.getElementById('speed-bar');
  bar.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${i < level ? 'var(--neon-purple)' : 'rgba(255,255,255,0.06)'};box-shadow:${i < level ? '0 0 6px rgba(191,0,255,0.6)' : 'none'}`;
    bar.appendChild(dot);
  }
}
 
// ── DRAWING ──
const SNAKE_COLORS = ['#00ff88','#00ee77','#00dd66','#00cc55'];
 
function draw() {
  // Clear
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
 
  // Grid dots
  ctx.fillStyle = 'rgba(0,255,136,0.04)';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.fillRect(x * GRID + GRID/2 - 1, y * GRID + GRID/2 - 1, 2, 2);
    }
  }
 
  // Food
  drawFood();
 
  // Snake
  drawSnake();
}
 
function drawSnake() {
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const alpha = Math.max(0.3, 1 - (i / snake.length) * 0.7);
    const color = isHead ? '#00ff88' : `rgba(0,255,${Math.floor(136 * alpha)},${alpha})`;
 
    ctx.save();
 
    // Glow for head
    if (isHead) {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 18;
    } else if (i < 5) {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 8 - i;
    }
 
    ctx.fillStyle = color;
    const pad = isHead ? 1 : 2;
    const size = GRID - pad * 2;
    roundRect(ctx, seg.x * GRID + pad, seg.y * GRID + pad, size, size, isHead ? 5 : 3);
    ctx.fill();
 
    // Head eyes
    if (isHead) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#050510';
      const ex = dir.x === 1 ? 12 : dir.x === -1 ? 4 : 6;
      const ey = dir.y === 1 ? 12 : dir.y === -1 ? 4 : 6;
      ctx.beginPath(); ctx.arc(seg.x * GRID + ex, seg.y * GRID + ey, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(seg.x * GRID + (GRID - ex), seg.y * GRID + ey, 2, 0, Math.PI * 2); ctx.fill();
    }
 
    ctx.restore();
  });
}
 
let foodPulse = 0;
function drawFood() {
  foodPulse = (foodPulse + 0.08) % (Math.PI * 2);
  const pulse = Math.sin(foodPulse);
  const radius = 6 + pulse * 2;
  const glow = 12 + pulse * 8;
 
  const fx = food.x * GRID + GRID / 2;
  const fy = food.y * GRID + GRID / 2;
 
  ctx.save();
  ctx.shadowColor = '#ff003c';
  ctx.shadowBlur = glow;
 
  ctx.fillStyle = '#ff003c';
  ctx.beginPath();
  ctx.arc(fx, fy, radius, 0, Math.PI * 2);
  ctx.fill();
 
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,100,100,0.8)';
  ctx.beginPath();
  ctx.arc(fx - 2, fy - 2, radius * 0.35, 0, Math.PI * 2);
  ctx.fill();
 
  ctx.restore();
}
 
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
 
// Animate food on start screen
function drawIdle() {
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,255,136,0.04)';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.fillRect(x * GRID + GRID/2 - 1, y * GRID + GRID/2 - 1, 2, 2);
  if (food) drawFood();
  if (!running) requestAnimationFrame(drawIdle);
}
placeFood();
drawIdle();
 
// Input
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x:0, y:-1 }, ArrowDown: { x:0, y:1 },
    ArrowLeft: { x:-1, y:0 }, ArrowRight: { x:1, y:0 },
    w: { x:0, y:-1 }, s: { x:0, y:1 },
    a: { x:-1, y:0 }, d: { x:1, y:0 },
    W: { x:0, y:-1 }, S: { x:0, y:1 },
    A: { x:-1, y:0 }, D: { x:1, y:0 },
  };
  if (map[e.key]) {
    e.preventDefault();
    const nd = map[e.key];
    // Prevent reversing
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
  }
  if ((e.key === 'Enter' || e.key === ' ') && !running) {
    startGame();
  }
});
 
// Touch support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    const nd = dx > 0 ? { x:1,y:0 } : { x:-1,y:0 };
    if (nd.x !== -dir.x) nextDir = nd;
  } else {
    const nd = dy > 0 ? { x:0,y:1 } : { x:0,y:-1 };
    if (nd.y !== -dir.y) nextDir = nd;
  }
  touchStart = null;
}, { passive: true });
</script>
