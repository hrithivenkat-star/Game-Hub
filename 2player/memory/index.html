<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Memory Match · 2P</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--c0:#00f5ff;--c1:#bf00ff;--c2:#ff006e;--c3:#00ff88;--c4:#ffe600;--c7:#0088ff;--bg:#030516;--dim:#3a4872}
html,body{min-height:100%;background:var(--bg);font-family:'Rajdhani',sans-serif;color:#e0e8ff;display:flex;flex-direction:column;touch-action:manipulation;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes matchPop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes pointFly{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-300% center}100%{background-position:300% center}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(3,5,22,.98);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,136,255,.08)}
.tlogo{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--c0);text-decoration:none;letter-spacing:2px}
.tlogo em{color:var(--c1);font-style:normal}
.toplinks{display:flex;gap:6px}
.tbtn{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);border:1px solid rgba(255,255,255,.07);padding:5px 10px;border-radius:5px;background:none;cursor:pointer;text-decoration:none;transition:all .2s;font-family:'Rajdhani',sans-serif}
.tbtn:hover{color:var(--c0)}

/* PLAYER PANELS */
.player-panels{position:relative;z-index:10;display:flex;flex-shrink:0}
.pp{flex:1;display:flex;align-items:center;gap:10px;padding:9px 13px;background:rgba(3,5,22,.94);border-bottom:3px solid transparent;transition:all .3s}
.pp.myturn{border-bottom-color:var(--tcol)!important;background:rgba(0,0,0,.22)}
.pp.myturn .pp-name{opacity:1;color:var(--tcol)}
.pp.myturn .pp-avatar{border-color:var(--tcol);box-shadow:0 0 16px var(--tglow)}
.pp-r{justify-content:flex-end;flex-direction:row-reverse}
.pp-avatar{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:all .3s;background:rgba(255,255,255,.04)}
.pp-info{min-width:0;flex:1}
.pp-name{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.5;transition:all .3s;margin-bottom:3px}
.pp-score-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pp-score{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;line-height:1}
.pp-pairs{font-size:10px;color:var(--dim);font-weight:600}
.pp-streak{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;display:none}
.pp-msg{font-size:10px;font-weight:700;min-height:13px;margin-top:2px}
.pp-divider{width:1px;background:rgba(255,255,255,.06);flex-shrink:0;align-self:stretch}
.turn-center{padding:9px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0}
.tc-pill{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;padding:4px 11px;border-radius:9px;letter-spacing:1px;transition:all .25s;white-space:nowrap}
.pairs-remain{font-size:9px;color:var(--dim);letter-spacing:.5px}

/* MAIN */
.main{flex:1;position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding:10px;gap:10px;overflow:auto}

/* GRID SIZE SELECTOR */
.grid-sel{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.gs-btn{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,.09);color:var(--dim);background:transparent;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.gs-btn.on{background:rgba(0,136,255,.12);border-color:rgba(0,136,255,.38);color:var(--c7)}
.gs-btn:hover:not(.on){border-color:rgba(255,255,255,.22);color:#fff}

/* CARD GRID */
.card-grid{display:grid;gap:5px;width:100%}
.cw{perspective:800px;cursor:pointer;aspect-ratio:1}
.cw.matched{pointer-events:none;cursor:default}
.cw.wrong .ci{animation:wrongShake .3s ease}
.ci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,.2,.2,1)}
.cw.flipped .ci,.cw.matched .ci{transform:rotateY(180deg)}
.cf,.cb{position:absolute;inset:0;border-radius:9px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center}
.cb{background:linear-gradient(135deg,rgba(0,136,255,.1),rgba(191,0,255,.08));border:1px solid rgba(0,136,255,.2);font-size:clamp(14px,3vw,20px);transition:all .2s}
.cb-text{color:rgba(0,136,255,.35);font-family:'Orbitron',sans-serif;font-size:clamp(10px,2.5vw,16px);font-weight:900}
.cw:not(.flipped):not(.matched) .cb:hover{background:rgba(0,136,255,.18);border-color:rgba(0,136,255,.45)}
.cf{transform:rotateY(180deg);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-size:clamp(16px,4vw,28px)}
/* Matched colors per player */
.cw.matched.m1 .cf{background:rgba(0,136,255,.14);border-color:rgba(0,136,255,.55);box-shadow:0 0 16px rgba(0,136,255,.2);animation:matchPop .4s ease}
.cw.matched.m2 .cf{background:rgba(255,0,110,.12);border-color:rgba(255,0,110,.55);box-shadow:0 0 16px rgba(255,0,110,.2);animation:matchPop .4s ease}

/* POINT INDICATOR */
.point-fly{position:fixed;font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;pointer-events:none;z-index:90;animation:pointFly .9s ease forwards}

/* RESULT */
.result-ov{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center;background:rgba(3,5,22,.97);backdrop-filter:blur(14px);animation:fadeIn .3s ease}
.result-ov.hide{display:none}
.ro-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,136,255,.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.ro-icon{font-size:58px;margin-bottom:13px;position:relative;z-index:1;animation:float 2.5s ease-in-out infinite}
.ro-title{font-family:'Orbitron',sans-serif;font-size:clamp(22px,5vw,34px);font-weight:900;margin-bottom:8px;position:relative;z-index:1;letter-spacing:2px}
.ro-sub{font-size:14px;color:var(--dim);margin-bottom:16px;position:relative;z-index:1;max-width:360px;line-height:1.65}
.ro-stats{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 20px;margin-bottom:16px;width:100%;max-width:380px;position:relative;z-index:1;animation:slideUp .3s ease}
.rs-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.rs-row:last-child{border-bottom:none}
.rs-av{font-size:22px;flex-shrink:0}
.rs-info{flex:1;text-align:left}
.rs-name{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;margin-bottom:2px}
.rs-detail{font-size:11px;color:var(--dim)}
.rs-score{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900}
.ro-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.btn{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:12px 24px;border-radius:9px;cursor:pointer;border:none;transition:all .25s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-b{background:rgba(0,136,255,.14);color:var(--c7);border:1px solid rgba(0,136,255,.4)}
.btn-b:hover{background:rgba(0,136,255,.24);box-shadow:0 0 24px rgba(0,136,255,.28);transform:translateY(-2px)}
.btn-back{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid rgba(255,255,255,.1)}
.btn-back:hover{color:#fff;background:rgba(255,255,255,.09)}
.btn-tourn{background:rgba(255,230,0,.12);color:var(--c4);border:1px solid rgba(255,230,0,.35)}
.btn-tourn:hover{background:rgba(255,230,0,.22);transform:translateY(-2px)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="topbar">
  <a href="../../index.html" class="tlogo">GAME<em>HUB</em></a>
  <div class="toplinks">
    <a href="../index.html" class="tbtn">← 2P Hub</a>
    <a href="../tournament.html" class="tbtn" id="t-nav" style="display:none">🏆 Tourn</a>
  </div>
</div>

<div class="player-panels">
  <div class="pp" id="pp1" style="--tcol:var(--c7);--tglow:rgba(0,136,255,.18)">
    <div class="pp-avatar" id="av1">🔵</div>
    <div class="pp-info">
      <div class="pp-name" id="pn1">Player 1</div>
      <div class="pp-score-row">
        <div class="pp-score" style="color:var(--c7)" id="sc1">0</div>
        <div class="pp-pairs" id="pairs1">pairs</div>
        <div class="pp-streak" id="streak1" style="background:rgba(0,136,255,.1);color:var(--c7);border:1px solid rgba(0,136,255,.2)"></div>
      </div>
      <div class="pp-msg" id="msg1"></div>
    </div>
  </div>
  <div class="pp-divider"></div>
  <div class="turn-center">
    <div class="tc-pill" id="tc-pill" style="background:rgba(0,136,255,.1);color:var(--c7);border:1px solid rgba(0,136,255,.25)">P1's Turn</div>
    <div class="pairs-remain" id="pairs-remain">16 pairs left</div>
  </div>
  <div class="pp-divider"></div>
  <div class="pp pp-r" id="pp2" style="--tcol:var(--c2);--tglow:rgba(255,0,110,.18)">
    <div class="pp-avatar" id="av2">🔴</div>
    <div class="pp-info" style="text-align:right">
      <div class="pp-name" id="pn2">Player 2</div>
      <div class="pp-score-row" style="justify-content:flex-end">
        <div class="pp-streak" id="streak2" style="background:rgba(255,0,110,.1);color:var(--c2);border:1px solid rgba(255,0,110,.2)"></div>
        <div class="pp-pairs" id="pairs2" style="text-align:right">pairs</div>
        <div class="pp-score" style="color:var(--c2)" id="sc2">0</div>
      </div>
      <div class="pp-msg" id="msg2" style="text-align:right"></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="grid-sel" id="grid-sel">
    <button class="gs-btn" onclick="setGridSize(4,4,this)">4×4</button>
    <button class="gs-btn on" onclick="setGridSize(6,6,this)">6×6</button>
    <button class="gs-btn" onclick="setGridSize(8,8,this)">8×8</button>
  </div>
  <div class="card-grid" id="grid"></div>
</div>

<div class="result-ov hide" id="result-ov">
  <div class="ro-glow"></div>
  <div class="ro-icon" id="ro-icon">🏆</div>
  <div class="ro-title" id="ro-title">Player 1 Wins!</div>
  <div class="ro-sub" id="ro-sub">Most pairs found!</div>
  <div class="ro-stats" id="ro-stats"></div>
  <div class="ro-btns">
    <button class="btn btn-b" onclick="startGame()">Play Again</button>
    <button class="btn btn-tourn hide" id="tourn-btn" onclick="doReport()">Report Result →</button>
    <a href="../index.html" class="btn btn-back">← Back</a>
  </div>
</div>

<script>
/* BG */
{const bc=document.getElementById('bg-canvas');const bx=bc.getContext('2d');
function rs(){bc.width=innerWidth;bc.height=innerHeight;}rs();addEventListener('resize',rs);
const pts=Array.from({length:45},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.00015,vy:(Math.random()-.5)*.00015,r:.3+Math.random()*.7,t:Math.random()*6.28}));
(function tick(){bx.fillStyle='rgba(3,5,22,.88)';bx.fillRect(0,0,bc.width,bc.height);
pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.t+=.018;if(p.x<0||p.x>1)p.vx*=-1;if(p.y<0||p.y>1)p.vy*=-1;
bx.globalAlpha=.12+Math.sin(p.t)*.08;bx.fillStyle='#0088ff';bx.beginPath();bx.arc(p.x*bc.width,p.y*bc.height,p.r,0,6.28);bx.fill();});bx.globalAlpha=1;
requestAnimationFrame(tick);})();}

/* PARAMS */
const SP=new URLSearchParams(location.search);
const MODE=SP.get('mode')||'2p',DIFF=SP.get('diff')||'medium',TOURN=SP.get('tournament')==='1';
const P1N=sessionStorage.getItem('t_p1')||'Player 1',P2N=sessionStorage.getItem('t_p2')||(MODE==='ai'?'AI Bot':'Player 2');
if(TOURN){document.getElementById('t-nav').style.display='';document.getElementById('t-nav').href='../tournament.html?mode='+MODE+'&diff='+DIFF;}
document.getElementById('pn1').textContent=P1N.slice(0,12);document.getElementById('pn2').textContent=P2N.slice(0,12);
if(MODE==='ai'){document.getElementById('av2').textContent='🤖';}

/* EMOJIS */
const ALL_EMOJIS=['🌟','🔥','💎','🦋','🎯','🚀','🌈','🎸','🌙','🦄','🎭','🍕','🐉','⚡','🎪','🌺','🦅','🎨','💫','🌊','🏔','🎺','🦊','🌸','🎲','🛸','🔮','🎃','🐬','🦋','🏆','🎯'];

let cards=[],flipped=[],matched=0,turn=1,canClick=true,gameOver=false,lastResult='tie';
let p1Score=0,p2Score=0,p1Streak=0,p2Streak=0;
const aiMem={};
let gridCols=6,gridRows=6;// default 6x6 = 18 pairs

function setGridSize(r,c,btn){
  gridRows=r;gridCols=c;
  document.querySelectorAll('.gs-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  startGame();
}
window.setGridSize=setGridSize;

function startGame(){
  document.getElementById('result-ov').classList.add('hide');
  const grid=document.getElementById('grid');grid.innerHTML='';
  cards=[];flipped=[];matched=0;turn=1;canClick=true;gameOver=false;
  p1Score=0;p2Score=0;p1Streak=0;p2Streak=0;
  Object.keys(aiMem).forEach(k=>delete aiMem[k]);
  const total=gridRows*gridCols;const pairs=total/2;
  grid.style.gridTemplateColumns=`repeat(${gridCols},1fr)`;
  // Calculate cell size
  const maxW=Math.min(window.innerWidth-20,560);const cellSz=Math.floor((maxW-gridCols*5)/gridCols);
  grid.style.maxWidth=maxW+'px';
  const emojis=ALL_EMOJIS.slice(0,pairs);
  const deck=[...emojis,...emojis].sort(()=>Math.random()-.5);
  deck.forEach((emoji,i)=>{
    const wrap=document.createElement('div');wrap.className='cw';
    wrap.style.fontSize=Math.max(14,Math.min(28,cellSz*.45))+'px';
    wrap.innerHTML=`<div class="ci"><div class="cb"><span class="cb-text">?</span></div><div class="cf">${emoji}</div></div>`;
    wrap.addEventListener('click',()=>flipCard(i));
    grid.appendChild(wrap);
    cards.push({emoji,el:wrap,flipped:false,matched:false});
  });
  document.getElementById('sc1').textContent='0';document.getElementById('sc2').textContent='0';
  document.getElementById('pairs-remain').textContent=pairs+' pairs left';
  document.getElementById('msg1').textContent='';document.getElementById('msg2').textContent='';
  updateTurnUI();
}
window.startGame=startGame;

function updateTurnUI(){
  const tcp=document.getElementById('tc-pill');
  document.getElementById('pp1').classList.toggle('myturn',turn===1);
  document.getElementById('pp2').classList.toggle('myturn',turn===2);
  document.getElementById('pairs1').textContent=p1Score===1?'pair':'pairs';
  document.getElementById('pairs2').textContent=p2Score===1?'pair':'pairs';
  if(turn===1){tcp.style.cssText='background:rgba(0,136,255,.1);color:var(--c7);border:1px solid rgba(0,136,255,.25)';tcp.textContent=P1N.slice(0,8)+'\'s Turn';}
  else if(MODE==='ai'){tcp.style.cssText='background:rgba(191,0,255,.1);color:var(--c1);border:1px solid rgba(191,0,255,.25)';tcp.textContent='🤖 AI Thinking...';}
  else{tcp.style.cssText='background:rgba(255,0,110,.1);color:var(--c2);border:1px solid rgba(255,0,110,.25)';tcp.textContent=P2N.slice(0,8)+'\'s Turn';}
}

function flipCard(i){
  if(!canClick||cards[i].flipped||cards[i].matched)return;
  if(MODE==='ai'&&turn===2)return;
  doFlip(i);
}

function doFlip(i){
  cards[i].flipped=true;cards[i].el.classList.add('flipped');
  aiMem[i]=cards[i].emoji;flipped.push(i);
  if(flipped.length===2){canClick=false;setTimeout(checkMatch,700);}
}

function checkMatch(){
  const [a,b]=flipped;
  if(cards[a].emoji===cards[b].emoji){
    // MATCH!
    const matchClass='matched m'+(turn===1?'1':'2');
    cards[a].matched=cards[b].matched=true;
    cards[a].el.classList.add(...matchClass.split(' '));
    cards[b].el.classList.add(...matchClass.split(' '));
    // Score + streak
    if(turn===1){p1Score++;p1Streak++;if(p1Score>1)showStreak(1,p1Streak);}
    else{p2Score++;p2Streak++;if(p2Score>1)showStreak(2,p2Streak);}
    matched++;
    document.getElementById('sc1').textContent=p1Score;document.getElementById('sc2').textContent=p2Score;
    const total=cards.length/2;document.getElementById('pairs-remain').textContent=(total-matched)+' pairs left';
    // Point fly animation
    showPointFly(a,turn);
    setMsg(turn===1?1:2,p1Streak>2||p2Streak>2?`🔥 ${turn===1?p1Streak:p2Streak} in a row!`:'✅ Match! Go again!');
    flipped=[];canClick=true;
    if(matched===total){setTimeout(showResult,400);}
    else if(MODE==='ai'&&turn===2)setTimeout(aiTurn,500);
  } else {
    // NO MATCH
    if(turn===1)p1Streak=0;else p2Streak=0;
    document.getElementById('streak'+turn).style.display='none';
    cards[a].el.classList.add('wrong');cards[b].el.classList.add('wrong');
    setTimeout(()=>{
      cards[a].flipped=false;cards[b].flipped=false;
      cards[a].el.classList.remove('flipped','wrong');cards[b].el.classList.remove('flipped','wrong');
      flipped=[];turn=turn===1?2:1;canClick=true;setMsg(1,'');setMsg(2,'');updateTurnUI();
      if(MODE==='ai'&&turn===2)setTimeout(aiTurn,500);
    },700);
  }
}

function showStreak(player,n){
  const el=document.getElementById('streak'+player);
  if(n>=2){el.style.display='block';el.textContent='🔥×'+n;}else el.style.display='none';
}

function showPointFly(cardIdx,player){
  const card=cards[cardIdx].el;const rect=card.getBoundingClientRect();
  const el=document.createElement('div');el.className='point-fly';
  el.textContent='+1';el.style.cssText=`left:${rect.left+rect.width/2-12}px;top:${rect.top}px;color:${player===1?'var(--c7)':'var(--c2)'}`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function setMsg(player,msg){document.getElementById('msg'+player).textContent=msg;}

/* AI MEMORY */
function aiTurn(){
  const unmatched=cards.map((c,i)=>c.matched?null:i).filter(i=>i!==null);if(!unmatched.length)return;
  const rc={easy:.18,medium:.60,hard:.97}[DIFF]||.60;
  let p1=null,p2=null;
  // Hunt in memory
  if(Math.random()<rc){
    const by={};Object.keys(aiMem).forEach(k=>{if(!cards[k].matched){const e=aiMem[k];(by[e]=by[e]||[]).push(+k);}});
    for(const e in by)if(by[e].length>=2){p1=by[e][0];p2=by[e][1];break;}
  }
  if(p1===null){
    p1=unmatched[Math.floor(Math.random()*unmatched.length)];
    const others=unmatched.filter(i=>i!==p1);
    if(Math.random()<rc&&aiMem[p1])p2=others.find(i=>aiMem[i]===aiMem[p1]&&!cards[i].matched);
    if(p2===undefined||p2===null)p2=others[Math.floor(Math.random()*others.length)];
  }
  if(p2===undefined||p2===null)return;
  doFlip(p1);setTimeout(()=>{if(!cards[p2].matched)doFlip(p2);},580);
}

/* RESULT */
function showResult(){
  gameOver=true;let icon,title,sub;
  if(p1Score>p2Score){icon='🏆';title=P1N+' Wins!';sub=p1Score+' vs '+p2Score+' pairs';lastResult='p1';}
  else if(p2Score>p1Score){icon=MODE==='ai'?'🤖':'🏅';title=P2N+' Wins!';sub=p2Score+' vs '+p1Score+' pairs';lastResult=MODE==='ai'?'ai':'p2';}
  else{icon='🤝';title='Draw!';sub='Both found '+p1Score+' pairs';lastResult='tie';}
  sessionStorage.setItem('t_last_result',lastResult);
  document.getElementById('ro-icon').textContent=icon;
  const rt=document.getElementById('ro-title');rt.textContent=title;rt.style.color=p1Score>p2Score?'var(--c7)':p2Score>p1Score?'var(--c2)':'var(--dim)';
  document.getElementById('ro-sub').textContent=sub;
  const stats=`
    <div class="rs-row">
      <div class="rs-av">🔵</div>
      <div class="rs-info"><div class="rs-name" style="color:var(--c7)">${P1N}</div><div class="rs-detail">Best streak: 🔥${p1Streak}</div></div>
      <div class="rs-score" style="color:var(--c7)">${p1Score}</div>
    </div>
    <div class="rs-row">
      <div class="rs-av">${MODE==='ai'?'🤖':'🔴'}</div>
      <div class="rs-info"><div class="rs-name" style="color:var(--c2)">${P2N}</div><div class="rs-detail">Best streak: 🔥${p2Streak}</div></div>
      <div class="rs-score" style="color:var(--c2)">${p2Score}</div>
    </div>`;
  document.getElementById('ro-stats').innerHTML=stats;
  if(TOURN)document.getElementById('tourn-btn').style.display='';
  document.getElementById('result-ov').classList.remove('hide');
}

function doReport(){window.location.href='../tournament.html?result='+lastResult;}
window.doReport=doReport;
startGame();
</script>
</body>
</html>
